<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🧱 街机打砖块 | AR游戏厅</title>
<style>
:root{--neon-pink:#ff2d95;--neon-cyan:#0ff;--neon-yellow:#ffe600;--neon-green:#39ff14;--neon-purple:#b44dff;--bg:#0a0a0f;--panel:#111122}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg);color:#e0e0f0;overflow:hidden;
  font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
}
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px);
}
.header{
  text-align:center;margin:15px 0 10px;position:relative;z-index:1;
}
.header h1{font-size:clamp(22px,4vw,32px);font-weight:900;
  background:linear-gradient(180deg,var(--neon-cyan),var(--neon-purple));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.header .sub{font-size:12px;letter-spacing:.3em;color:var(--neon-cyan);opacity:.7;font-family:'Courier New',monospace}
.back-btn{
  position:fixed;top:15px;left:15px;z-index:100;
  background:var(--panel);border:1px solid rgba(255,255,255,.15);
  color:var(--neon-cyan);padding:8px 16px;border-radius:20px;
  cursor:pointer;font-size:13px;letter-spacing:.05em;
  transition:all .3s;text-decoration:none;
}
.back-btn:hover{border-color:var(--neon-cyan);box-shadow:0 0 20px rgba(0,255,255,.2)}
canvas{display:block;border:1px solid rgba(255,255,255,.06);border-radius:8px;position:relative;z-index:1}
.stats{
  position:relative;z-index:1;
  display:flex;gap:25px;margin:10px 0;
  font-family:'Courier New',monospace;font-size:14px;
}
.stat-item{display:flex;align-items:center;gap:6px}
.stat-label{color:rgba(255,255,255,.5)}
.stat-value{color:var(--neon-cyan);font-weight:700}
.controls{
  position:relative;z-index:1;margin-top:10px;
  display:flex;gap:10px;
}
.btn{
  padding:10px 22px;border-radius:20px;
  font-size:13px;font-weight:600;letter-spacing:.05em;
  cursor:pointer;transition:all .3s;
  background:transparent;border:2px solid var(--neon-cyan);
  color:var(--neon-cyan);font-family:inherit;
}
.btn:hover{background:var(--neon-cyan);color:var(--bg);box-shadow:0 0 25px rgba(0,255,255,.4)}
.btn.pink{border-color:var(--neon-pink);color:var(--neon-pink)}
.btn.pink:hover{background:var(--neon-pink);color:var(--bg);box-shadow:0 0 25px rgba(255,45,149,.4)}
.instruction{
  text-align:center;margin-top:8px;position:relative;z-index:1;
  font-size:12px;color:rgba(255,255,255,.35);letter-spacing:.08em;
}
.mobile-control{display:none}
@media(max-width:768px){
  .mobile-control{display:flex;justify-content:center;gap:20px;margin-top:10px;position:relative;z-index:1}
  .m-btn{width:60px;height:60px;border-radius:50%;border:2px solid var(--neon-cyan);background:rgba(0,255,255,.1);color:var(--neon-cyan);font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
  .m-btn:active{background:var(--neon-cyan);color:var(--bg)}
  canvas{border:none}
}
</style>
</head>
<body>

<a href="ar-game-lobby.html" class="back-btn">← 返回大厅</a>

<div class="header">
  <h1>🧱 街机打砖块</h1>
  <p class="sub">ARCADE BREAKOUT · NEON EDITION</p>
</div>

<div class="stats">
  <div class="stat-item"><span class="stat-label">🕹️ 分数</span><span class="stat-value" id="score">0</span></div>
  <div class="stat-item"><span class="stat-label">💚 生命</span><span class="stat-value" id="lives">3</span></div>
  <div class="stat-item"><span class="stat-label">🎯 关卡</span><span class="stat-value" id="level">1</span></div>
</div>

<canvas id="gameCanvas"></canvas>

<div class="mobile-control" id="mobileCtrl">
  <button class="m-btn" id="btnLeft">◀</button>
  <button class="m-btn" id="btnRight">▶</button>
</div>

<div class="controls">
  <button class="btn" onclick="startGame()">🔄 重新开始</button>
  <button class="btn pink" onclick="togglePause()">⏯️ 暂停</button>
</div>

<p class="instruction">← → 或 A/D 移动 · 空格发射/暂停 · 触屏拖动挡板</p>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Responsive canvas
function resizeCanvas() {
  const maxW = Math.min(window.innerWidth - 20, 600);
  const maxH = Math.min(window.innerHeight - 300, 450);
  canvas.width = maxW;
  canvas.height = maxH;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// Game state
let paddle, ball, bricks, particles;
let score = 0, lives = 3, level = 1;
let gameRunning = false, gamePaused = false;
let ballLaunched = false;
let keys = {};
let touchX = null;

// Colors - neon palette
const neonColors = ['#ff2d95','#0ff','#ffe600','#39ff14','#b44dff','#ff6b35','#00d4ff'];
const brickRows = 5, brickCols = 8;

function initBricks() {
  bricks = [];
  const brickW = (canvas.width - 20) / brickCols;
  const brickH = 20;
  const padding = 2;
  
  for (let r = 0; r < brickRows; r++) {
    for (let c = 0; c < brickCols; c++) {
      bricks.push({
        x: 10 + c * brickW + padding,
        y: 50 + r * (brickH + padding),
        w: brickW - padding * 2,
        h: brickH,
        color: neonColors[(r * brickCols + c) % neonColors.length],
        alive: true,
        hp: level > 2 && r === 0 ? 2 : 1
      });
    }
  }
}

function initGame() {
  paddle = {
    w: Math.max(80, canvas.width / 7),
    h: 12,
    x: canvas.width / 2,
    y: canvas.height - 30
  };
  
  ball = {
    x: canvas.width / 2,
    y: canvas.height - 50,
    r: 7,
    dx: 4 + level * 0.5,
    dy: -(4 + level * 0.5),
    speed: 5 + level * 0.5
  };
  
  particles = [];
  initBricks();
  ballLaunched = false;
  gamePaused = false;
}

function spawnParticles(x, y, color) {
  for (let i = 0; i < 8; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 4,
      vy: (Math.random() - 0.5) * 4,
      life: 1,
      decay: 0.02 + Math.random() * 0.03,
      color: color,
      r: 2 + Math.random() * 3
    });
  }
}

function drawPaddle() {
  // Glow
  const glowGrad = ctx.createLinearGradient(paddle.x - paddle.w/2, paddle.y, paddle.x + paddle.w/2, paddle.y);
  glowGrad.addColorStop(0, 'rgba(0,255,255,0)');
  glowGrad.addColorStop(0.5, 'rgba(0,255,255,0.4)');
  glowGrad.addColorStop(1, 'rgba(0,255,255,0)');
  ctx.fillStyle = glowGrad;
  ctx.fillRect(paddle.x - paddle.w/2 - 10, paddle.y - 3, paddle.w + 20, paddle.h + 6);
  
  // Paddle body
  const grad = ctx.createLinearGradient(paddle.x - paddle.w/2, paddle.y, paddle.x + paddle.w/2, paddle.y);
  grad.addColorStop(0, '#0af');
  grad.addColorStop(0.5, '#0ff');
  grad.addColorStop(1, '#0af');
  ctx.fillStyle = grad;
  roundRect(paddle.x - paddle.w/2, paddle.y, paddle.w, paddle.h, 6);
  
  // Edge highlights
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(paddle.x - paddle.w/2 + 6, paddle.y);
  ctx.lineTo(paddle.x + paddle.w/2 - 6, paddle.y);
  ctx.stroke();
}

function drawBall() {
  ctx.save();
  // Glow
  const glow = ctx.createRadialGradient(ball.x, ball.y, ball.r * 0.3, ball.x, ball.y, ball.r * 2.5);
  glow.addColorStop(0, 'rgba(255,255,255,0.8)');
  glow.addColorStop(0.4, 'rgba(255,45,149,0.3)');
  glow.addColorStop(1, 'rgba(255,45,149,0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r * 2.5, 0, Math.PI * 2);
  ctx.fill();
  
  // Ball
  const bgrad = ctx.createRadialGradient(ball.x - 1, ball.y - 1, 1, ball.x, ball.y, ball.r);
  bgrad.addColorStop(0, '#fff');
  bgrad.addColorStop(0.5, '#ff2d95');
  bgrad.addColorStop(1, '#cc0066');
  ctx.fillStyle = bgrad;
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawBricks() {
  bricks.forEach(b => {
    if (!b.alive) return;
    ctx.save();
    // Glow
    ctx.shadowColor = b.color;
    ctx.shadowBlur = 12;
    // Body
    const grad = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.h);
    grad.addColorStop(0, b.color);
    grad.addColorStop(1, 'rgba(0,0,0,0.3)');
    ctx.fillStyle = grad;
    roundRect(b.x, b.y, b.w, b.h, 3);
    // HP indicator
    if (b.hp > 1) {
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.fillRect(b.x + 4, b.y + b.h/2 - 1, b.w - 8, 2);
    }
    ctx.restore();
  });
}

function drawParticles() {
  particles.forEach((p, i) => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fillStyle = p.color.replace(')', `,${p.life})`).replace('rgb', 'rgba');
    if (p.color.startsWith('#')) {
      ctx.fillStyle = p.color + Math.floor(p.life * 255).toString(16).padStart(2, '0');
    }
    ctx.fill();
  });
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  ctx.fill();
}

function update() {
  if (!gameRunning || gamePaused) return;
  
  // Move paddle
  const paddleSpeed = 7;
  if (keys['ArrowLeft'] || keys['KeyA']) paddle.x -= paddleSpeed;
  if (keys['ArrowRight'] || keys['KeyD']) paddle.x += paddleSpeed;
  if (touchX !== null) {
    paddle.x = touchX;
  }
  paddle.x = Math.max(paddle.w/2, Math.min(canvas.width - paddle.w/2, paddle.x));
  
  // Launch ball
  if (!ballLaunched) {
    ball.x = paddle.x;
    ball.y = paddle.y - ball.r - 2;
    return;
  }
  
  // Move ball
  ball.x += ball.dx;
  ball.y += ball.dy;
  
  // Wall collision
  if (ball.x - ball.r <= 0 || ball.x + ball.r >= canvas.width) {
    ball.dx *= -1;
    spawnParticles(ball.x, ball.y, '#0ff');
  }
  if (ball.y - ball.r <= 0) {
    ball.dy *= -1;
    spawnParticles(ball.x, ball.y, '#ff2d95');
  }
  
  // Bottom - lose life
  if (ball.y + ball.r >= canvas.height) {
    lives--;
    document.getElementById('lives').textContent = lives;
    if (lives <= 0) {
      gameOver();
    } else {
      ballLaunched = false;
      ball.x = paddle.x;
      ball.y = paddle.y - ball.r - 2;
      ball.dx = ball.speed * (Math.random() > 0.5 ? 1 : -1);
      ball.dy = -ball.speed;
    }
  }
  
  // Paddle collision
  if (ball.y + ball.r >= paddle.y && 
      ball.y - ball.r <= paddle.y + paddle.h &&
      ball.x >= paddle.x - paddle.w/2 && 
      ball.x <= paddle.x + paddle.w/2) {
    const hitPos = (ball.x - paddle.x) / (paddle.w / 2);
    ball.dy = -Math.abs(ball.dy);
    ball.dx = hitPos * 5;
    ball.y = paddle.y - ball.r;
    spawnParticles(ball.x, ball.y, '#ffe600');
  }
  
  // Brick collision
  let allDead = true;
  bricks.forEach(b => {
    if (!b.alive) return;
    allDead = false;
    if (ball.x + ball.r > b.x && ball.x - ball.r < b.x + b.w &&
        ball.y + ball.r > b.y && ball.y - ball.r < b.y + b.h) {
      b.hp--;
      if (b.hp <= 0) {
        b.alive = false;
        score += level * 100;
        document.getElementById('score').textContent = score;
        spawnParticles(b.x + b.w/2, b.y + b.h/2, b.color);
      } else {
        spawnParticles(b.x + b.w/2, b.y + b.h/2, '#fff');
      }
      ball.dy *= -1;
    }
  });
  
  if (allDead && bricks.every(b => !b.alive)) {
    nextLevel();
  }
  
  // Update particles
  particles.forEach((p, i) => {
    p.x += p.vx;
    p.y += p.vy;
    p.life -= p.decay;
  });
  particles = particles.filter(p => p.life > 0);
}

function draw() {
  // Background grid
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // Grid lines
  ctx.strokeStyle = 'rgba(0,255,255,0.03)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x < canvas.width; x += 40) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, canvas.height);
    ctx.stroke();
  }
  for (let y = 0; y < canvas.height; y += 40) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(canvas.width, y);
    ctx.stroke();
  }
  
  drawBricks();
  drawPaddle();
  drawBall();
  drawParticles();
  
  // Ball ready indicator
  if (!ballLaunched && gameRunning) {
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.font = '14px "Courier New",monospace';
    ctx.textAlign = 'center';
    ctx.fillText('按 空格键 发射', canvas.width/2, canvas.height - 60);
  }
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

function nextLevel() {
  level++;
  document.getElementById('level').textContent = level;
  initBricks();
  ballLaunched = false;
  ball.speed += 1;
  ball.dx = ball.speed * (Math.random() > 0.5 ? 1 : -1);
  ball.dy = -ball.speed;
  ball.x = paddle.x;
  ball.y = paddle.y - ball.r - 2;
  showToast(`🎯 关卡 ${level}！`);
}

function gameOver() {
  gameRunning = false;
  const best = localStorage.getItem('breakoutBest') || 0;
  if (score > best) localStorage.setItem('breakoutBest', score);
  showToast(`💀 游戏结束！得分: ${score}`);
  setTimeout(() => startGame(), 2000);
}

function startGame() {
  score = 0; lives = 3; level = 1;
  document.getElementById('score').textContent = '0';
  document.getElementById('lives').textContent = '3';
  document.getElementById('level').textContent = '1';
  initGame();
  gameRunning = true;
}

function togglePause() {
  if (!gameRunning) return;
  gamePaused = !gamePaused;
  showToast(gamePaused ? '⏸️ 已暂停' : '▶️ 继续');
}

function showToast(msg) {
  const toast = document.createElement('div');
  toast.textContent = msg;
  toast.style.cssText = `
    position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
    background:var(--panel);color:var(--neon-cyan);border:1px solid var(--neon-cyan);
    padding:10px 24px;border-radius:20px;font-size:14px;letter-spacing:.05em;
    z-index:2000;animation:fade .3s ease-out, fade .3s ease-in 1.5s forwards;
    pointer-events:none;
  `;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2000);
}

// Controls
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') {
    e.preventDefault();
    if (!gameRunning) { startGame(); return; }
    if (gamePaused) { togglePause(); return; }
    if (!ballLaunched) {
      ballLaunched = true;
      ball.dx = ball.speed * (Math.random() > 0.5 ? 1 : -1);
      ball.dy = -ball.speed;
    }
  }
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// Touch controls
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  touchX = e.touches[0].clientX - rect.left;
});
canvas.addEventListener('touchend', () => { touchX = null; });
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (!gameRunning) { startGame(); return; }
  if (!ballLaunched) {
    ballLaunched = true;
    ball.dx = ball.speed * (Math.random() > 0.5 ? 1 : -1);
    ball.dy = -ball.speed;
  }
});

// Mobile buttons
const btnLeft = document.getElementById('btnLeft');
const btnRight = document.getElementById('btnRight');
let mobileInterval;
btnLeft.addEventListener('pointerdown', () => {
  keys['ArrowLeft'] = true;
  mobileInterval = setInterval(() => { keys['ArrowLeft'] = true; }, 16);
});
btnLeft.addEventListener('pointerup', () => {
  keys['ArrowLeft'] = false;
  clearInterval(mobileInterval);
});
btnRight.addEventListener('pointerdown', () => {
  keys['ArrowRight'] = true;
  mobileInterval = setInterval(() => { keys['ArrowRight'] = true; }, 16);
});
btnRight.addEventListener('pointerup', () => {
  keys['ArrowRight'] = false;
  clearInterval(mobileInterval);
});

// Show mobile controls
if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
  document.getElementById('mobileCtrl').style.display = 'flex';
}

// Add toast keyframes
const style = document.createElement('style');
style.textContent = '@keyframes fade{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}';
document.head.appendChild(style);

// Start
initGame();
gameRunning = true;
gameLoop();
</script>
</body>
</html>
