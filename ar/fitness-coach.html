---
layout: none
---
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AI 健身教练 - AR 体验工坊</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a14; font-family: -apple-system, "SF Pro Text", sans-serif; color: #fff; }
video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); pointer-events: none; }
#header { position: fixed; top: 0; left: 0; right: 0; padding: 16px 20px; display: flex; align-items: center; gap: 12px; z-index: 10; }
#back-btn { background: rgba(255,255,255,0.1); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 0.9rem; text-decoration: none; }
#title { font-size: 1.2rem; font-weight: 700; }
#hud { position: fixed; top: 70px; right: 20px; z-index: 10; text-align: right; }
#rep-count { font-size: 3rem; font-weight: 900; background: linear-gradient(135deg, #43e97b, #38f9d7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
#exercise-name { font-size: 0.9rem; opacity: 0.7; margin-top: 4px; }
#feedback { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; text-align: center; pointer-events: none; }
#feedback-text { font-size: 1.5rem; font-weight: 700; text-shadow: 0 0 30px currentColor; opacity: 0; transition: all 0.3s; }
#feedback-text.show { opacity: 1; }
#feedback-text.good { color: #43e97b; }
#feedback-text.warn { color: #ffd93d; }
#feedback-text.bad { color: #ff6b6b; }
#angle-display { position: fixed; bottom: 100px; left: 20px; z-index: 10; font-size: 0.8rem; opacity: 0.6; font-family: monospace; }
#controls { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 10; }
.ctrl-btn { background: rgba(255,255,255,0.1); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 10px 18px; border-radius: 25px; cursor: pointer; font-size: 0.8rem; transition: all 0.3s; }
.ctrl-btn:hover { background: rgba(255,255,255,0.25); }
.ctrl-btn.active { background: rgba(67,233,123,0.4); border-color: rgba(67,233,123,0.8); }
#status { position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); backdrop-filter: blur(20px); padding: 10px 20px; border-radius: 30px; font-size: 0.85rem; opacity: 0; transition: opacity 0.5s; z-index: 10; white-space: nowrap; }
#status.show { opacity: 1; }
#loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a14; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: opacity 0.5s; }
#loading.hidden { opacity: 0; pointer-events: none; }
.loader { width: 48px; height: 48px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #43e97b; border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#loading p { margin-top: 16px; font-size: 0.9rem; opacity: 0.7; }
#perm { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a14; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 99; text-align: center; }
#perm button { background: linear-gradient(135deg, #43e97b, #38f9d7); border: none; color: #fff; padding: 14px 32px; border-radius: 30px; font-size: 1rem; cursor: pointer; margin-top: 20px; }
</style>
</head>
<body>
<div id="loading"><div class="loader"></div><p>加载姿态检测模型...</p></div>
<div id="perm"><h2>🏋️ 需要摄像头权限</h2><p>AI 健身教练需要通过摄像头观察你的动作。</p><button onclick="startCam()">开启摄像头</button></div>
<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>
<div id="header">
  <a id="back-btn" href="/ar/">← 返回</a>
  <div id="title">🏋️ AI 健身教练</div>
</div>
<div id="hud">
  <div id="rep-count">0</div>
  <div id="exercise-name">深蹲</div>
</div>
<div id="feedback"><div id="feedback-text"></div></div>
<div id="angle-display"></div>
<div id="status">选择一个动作开始训练</div>
<div id="controls">
  <button class="ctrl-btn active" onclick="selectExercise('squat')">深蹲</button>
  <button class="ctrl-btn" onclick="selectExercise('pushup')">俯卧撑</button>
  <button class="ctrl-btn" onclick="selectExercise('curl')">弯举</button>
</div>

<script type="module">
import { PoseLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/vision_bundle.mjs";

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const loading = document.getElementById('loading');
const repCountEl = document.getElementById('rep-count');
const exerciseNameEl = document.getElementById('exercise-name');
const feedbackText = document.getElementById('feedback-text');
const angleDisplay = document.getElementById('angle-display');
const status = document.getElementById('status');

let poseLandmarker = null;
let currentExercise = 'squat';
let repCount = 0;
let fsmState = 'idle'; // idle -> down -> up -> (repeat)
let lastTime = -1;

const exercises = {
  squat: { name: '深蹲', keyAngle: 'knee', standThresh: 160, downThresh: 100, tips: ['膝盖不要超过脚尖', '保持背部挺直', '臀部向后坐'] },
  pushup: { name: '俯卧撑', keyAngle: 'elbow', standThresh: 160, downThresh: 80, tips: ['保持身体成一条直线', '手肘不要过度外展', '核心收紧'] },
  curl: { name: '弯举', keyAngle: 'elbow', standThresh: 160, downThresh: 50, tips: ['上臂固定不动', '缓慢控制下放', '顶峰收缩1秒'] },
};

// 骨骼连接关系
const POSE_CONNECTIONS = [
  [11,12],[11,13],[13,15],[12,14],[14,16],[11,23],[12,24],[23,24],[23,25],[25,27],[24,26],[26,28],[27,29],[28,30],[29,31],[30,32]
];

function calcAngle(a, b, c) {
  const ba = { x: a.x - b.x, y: a.y - b.y };
  const bc = { x: c.x - b.x, y: c.y - b.y };
  const dot = ba.x * bc.x + ba.y * bc.y;
  const magBA = Math.sqrt(ba.x * ba.x + ba.y * ba.y);
  const magBC = Math.sqrt(bc.x * bc.x + bc.y * bc.y);
  if (magBA === 0 || magBC === 0) return 0;
  return Math.acos(Math.max(-1, Math.min(1, dot / (magBA * magBC)))) * (180 / Math.PI);
}

function getAngles(landmarks) {
  // 膝关节角 (髋-膝-踝)
  const leftKnee = calcAngle(landmarks[23], landmarks[25], landmarks[27]);
  const rightKnee = calcAngle(landmarks[24], landmarks[26], landmarks[28]);
  const knee = Math.min(leftKnee, rightKnee);

  // 肘关节角 (肩-肘-腕)
  const leftElbow = calcAngle(landmarks[11], landmarks[13], landmarks[15]);
  const rightElbow = calcAngle(landmarks[12], landmarks[14], landmarks[16]);
  const elbow = Math.min(leftElbow, rightElbow);

  // 髋关节角 (肩-髋-膝)
  const leftHip = calcAngle(landmarks[11], landmarks[23], landmarks[25]);
  const rightHip = calcAngle(landmarks[12], landmarks[24], landmarks[26]);
  const hip = Math.min(leftHip, rightHip);

  return { knee, elbow, hip, leftKnee, rightKnee, leftElbow, rightElbow };
}

function runFSM(angles) {
  const ex = exercises[currentExercise];
  const angle = angles[ex.keyAngle];

  switch (fsmState) {
    case 'idle':
      if (angle > ex.standThresh) {
        fsmState = 'standing';
        showFeedback('准备就绪', 'good');
      }
      break;
    case 'standing':
      if (angle < ex.downThresh) {
        fsmState = 'down';
        showFeedback(ex.keyAngle === 'knee' ? '下蹲到位！' : '弯曲到位！', 'good');
      } else if (angle < ex.standThresh - 20) {
        // 中间状态 - 给提示
        const tip = ex.tips[Math.floor(Math.random() * ex.tips.length)];
        showFeedback(tip, 'warn');
      }
      break;
    case 'down':
      if (angle > ex.standThresh) {
        fsmState = 'standing';
        repCount++;
        repCountEl.textContent = repCount;
        showFeedback('✓ 完成 ' + repCount + ' 次', 'good');
        if (repCount % 5 === 0) {
          showFeedback('太棒了！已完成 ' + repCount + ' 次！', 'good');
        }
      }
      break;
  }
}

function showFeedback(msg, type) {
  feedbackText.textContent = msg;
  feedbackText.className = 'show ' + type;
  clearTimeout(feedbackText._timer);
  feedbackText._timer = setTimeout(() => { feedbackText.className = ''; }, 1500);
}

function drawSkeleton(landmarks) {
  const w = canvas.width, h = canvas.height;
  const angles = getAngles(landmarks);
  const ex = exercises[currentExercise];
  const keyAngle = angles[ex.keyAngle];

  // 颜色根据动作状态
  let boneColor = 'rgba(67,233,123,0.8)'; // good
  if (keyAngle < exercises[currentExercise].downThresh) boneColor = 'rgba(67,233,123,1)';
  else if (keyAngle < exercises[currentExercise].standThresh) boneColor = 'rgba(255,217,61,0.8)';

  // 绘制骨骼连线
  ctx.lineWidth = 3;
  for (const [a, b] of POSE_CONNECTIONS) {
    if (landmarks[a].visibility < 0.5 || landmarks[b].visibility < 0.5) continue;
    ctx.beginPath();
    ctx.moveTo(landmarks[a].x * w, landmarks[a].y * h);
    ctx.lineTo(landmarks[b].x * w, landmarks[b].y * h);
    ctx.strokeStyle = boneColor;
    ctx.stroke();
  }

  // 绘制关键点
  const keyPoints = [11,12,13,14,15,16,23,24,25,26,27,28];
  for (const idx of keyPoints) {
    if (landmarks[idx].visibility < 0.5) continue;
    ctx.beginPath();
    ctx.arc(landmarks[idx].x * w, landmarks[idx].y * h, 5, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.strokeStyle = boneColor;
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // 显示关键角度
  angleDisplay.innerHTML = `膝关节: ${angles.knee.toFixed(0)}°<br>肘关节: ${angles.elbow.toFixed(0)}°<br>髋关节: ${angles.hip.toFixed(0)}°<br>状态: ${fsmState}`;
}

async function init() {
  try {
    const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm");
    poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task",
        delegate: "GPU"
      },
      runningMode: "VIDEO",
      numPoses: 1
    });
    loading.classList.add('hidden');
    showStatus('选择一个动作开始训练');
    await startCam();
  } catch (e) {
    loading.innerHTML = '<p style="color:#ff6b6b">加载失败: ' + e.message + '</p>';
  }
}

window.startCam = async function() {
  document.getElementById('perm').style.display = 'none';
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
    });
    video.srcObject = stream;
    video.onloadedmetadata = () => {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      detect();
    };
  } catch (e) {
    document.getElementById('perm').style.display = 'flex';
  }
};

function detect() {
  if (video.readyState < 2) { requestAnimationFrame(detect); return; }
  const now = performance.now();
  if (now - lastTime < 66) { requestAnimationFrame(detect); return; } // ~15fps
  lastTime = now;

  const results = poseLandmarker.detectForVideo(video, now);
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (results.landmarks && results.landmarks.length > 0) {
    const landmarks = results.landmarks[0];
    drawSkeleton(landmarks);
    const angles = getAngles(landmarks);
    runFSM(angles);
  }
  requestAnimationFrame(detect);
}

window.selectExercise = function(type) {
  currentExercise = type;
  repCount = 0;
  fsmState = 'idle';
  repCountEl.textContent = '0';
  exerciseNameEl.textContent = exercises[type].name;
  document.querySelectorAll('.ctrl-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  showStatus('已切换到 ' + exercises[type].name);
};

function showStatus(msg) {
  status.textContent = msg;
  status.classList.add('show');
  clearTimeout(status._timer);
  status._timer = setTimeout(() => status.classList.remove('show'), 3000);
}

init();
</script>
</body>
</html>
