<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>手势生花 - 手指艺术滤镜</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0f;font-family:-apple-system,"SF Pro Text","Helvetica Neue",sans-serif;color:#fff}
video{display:none}
canvas{position:fixed;top:0;left:0;width:100%;height:100%}
#header{position:fixed;top:0;left:0;right:0;padding:20px;display:flex;align-items:center;gap:12px;z-index:10}
#back-btn{background:rgba(255,255,255,.1);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.2);color:#fff;padding:8px 16px;border-radius:20px;cursor:pointer;font-size:.9rem;text-decoration:none;transition:background .3s}
#back-btn:hover{background:rgba(255,255,255,.2)}
#title{font-size:1.2rem;font-weight:700;background:linear-gradient(135deg,#f8cdda,#f093fb);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#status{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);backdrop-filter:blur(20px);padding:12px 24px;border-radius:30px;font-size:.9rem;opacity:0;transition:opacity .5s;z-index:10;white-space:nowrap}
#status.show{opacity:1}
#hint{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:10;font-size:.7rem;opacity:.35;text-align:center;max-width:420px;line-height:1.7}
#effects{position:fixed;top:70px;left:20px;z-index:10;font-size:.8rem;line-height:2.2;opacity:.65}
.eff{display:flex;align-items:center;gap:6px;transition:opacity .3s}.eff.off{opacity:.25}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
:root{--neon-pink:#ff2d95;--neon-cyan:#0ff;--neon-yellow:#ffe600;--neon-purple:#b44dff;--neon-green:#39ff14;--neon-orange:#ff6b35}
#loading{position:fixed;inset:0;background:#0a0a0f;display:flex;align-items:center;justify-content:center;z-index:100;transition:opacity .6s}
#loading.hidden{opacity:0;pointer-events:none}
#loading p{margin-top:0;font-size:.9rem;opacity:.6}
.sticker-rain{position:absolute;font-size:22px;animation:fall var(--fd) linear infinite;animation-delay:var(--dl);opacity:0;left:var(--sx);filter:drop-shadow(0 0 6px currentColor);pointer-events:none}
@keyframes fall{0%{opacity:0;transform:translateY(-40px) rotate(0deg)}5%{opacity:.8}10%{opacity:.5}95%{opacity:.2}100%{opacity:0;transform:translateY(105vh) rotate(var(--sp))}}
.loading-content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:16px}
.loading-emojis{display:flex;gap:12px}
.loading-emoji{font-size:52px;animation:bounceEmoji .6s ease-in-out infinite;filter:drop-shadow(0 0 14px currentColor)}
@keyframes bounceEmoji{0%,100%{transform:translateY(0)}25%{transform:translateY(-22px) scale(1.12)}50%{transform:translateY(0) scale(.85)}75%{transform:translateY(-8px)}}
.load-bar-outer{width:280px;height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;border:1px solid rgba(255,255,255,.06)}
.load-bar-inner{height:100%;width:0%;background-size:200% 100%;border-radius:3px;box-shadow:0 0 16px var(--neon-orange);animation:barShimmer 2s linear infinite}
@keyframes barShimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
#perm{position:fixed;inset:0;background:#0a0a0f;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:99;text-align:center;padding:20px}
#perm h2{font-size:1.5rem;margin-bottom:8px}
#perm p{opacity:.6;max-width:300px}
#perm button{background:linear-gradient(135deg,#f8cdda,#f093fb);border:none;color:#1a1a2e;padding:14px 32px;border-radius:30px;font-size:1rem;font-weight:600;cursor:pointer;margin-top:20px}
</style>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
</head>
<body>
<div id="loading">
  <div class="loading-content">
    <div class="loading-emojis">
      <div class="loading-emoji" style="animation-delay:0s;color:var(--neon-pink)">🌸</div>
      <div class="loading-emoji" style="animation-delay:0.1s;color:var(--neon-purple)">🌺</div>
      <div class="loading-emoji" style="animation-delay:0.2s;color:var(--neon-cyan)">🦞</div>
      <div class="loading-emoji" style="animation-delay:0.3s;color:var(--neon-yellow)">🌷</div>
      <div class="loading-emoji" style="animation-delay:0.4s;color:var(--neon-green)">💮</div>
      <div class="loading-emoji" style="animation-delay:0.5s;color:var(--neon-pink)">✨</div>
    </div>
    <div class="load-bar-outer"><div class="load-bar-inner" id="load-bar" style="background:linear-gradient(90deg,var(--neon-pink),var(--neon-purple),var(--neon-cyan),var(--neon-yellow),var(--neon-green))"></div></div>
    <p id="load-text" style="font-family:'Courier New',monospace;letter-spacing:.1em;opacity:.65">加载花瓣魔法...</p>
  </div>
</div>
<div id="perm"><h2>需要摄像头权限</h2><p>手指艺术滤镜需要摄像头实时追踪手部与人体。</p><button onclick="startCam()">开启摄像头</button></div>
<video id="video" autoplay playsinline muted></video>
<div id="header"><a id="back-btn" href="ar-game-lobby.html">← 返回</a><div id="title">手势生花 · 艺术滤镜</div></div>
<div id="effects">
  <div class="eff off" id="eff-0"><span class="dot" style="background:#f8cdda"></span>拇指+食指 · 水彩</div>
  <div class="eff off" id="eff-1"><span class="dot" style="background:#4a3728"></span>中指+无名指 · 墨韵</div>
</div>
<div id="status">张开手指即可在身体上绘制艺术滤镜</div>
<div id="hint">张开相邻手指构成平面 → 滤镜仅在身体上生效<br>手指间距控制平面大小 · 效果随手指运动实时变化</div>

<script type="module">
// Sticker rain + loading bar
(function stickerLoading(){
  const stickers=['🌸','🌺','🦞','🌷','💮','✨','🎨'];
  const colors=['var(--neon-pink)','var(--neon-purple)','var(--neon-cyan)','var(--neon-yellow)','var(--neon-green)'];
  const container=document.getElementById('loading');
  setInterval(()=>{
    const e=document.createElement('div');e.className='sticker-rain';
    e.textContent=stickers[Math.floor(Math.random()*stickers.length)];
    e.style.setProperty('--sx',Math.random()*95+'%');e.style.setProperty('--fd',(5+Math.random()*7)+'s');
    e.style.setProperty('--dl',Math.random()*2+'s');e.style.setProperty('--sp',(Math.random()*720-360)+'deg');
    e.style.color=colors[Math.floor(Math.random()*colors.length)];e.style.fontSize=(14+Math.random()*18)+'px';
    container.appendChild(e);setTimeout(()=>e.remove(),12000);
  },300);
  for(let i=0;i<15;i++)setTimeout(()=>{
    const e=document.createElement('div');e.className='sticker-rain';
    e.textContent=stickers[Math.floor(Math.random()*stickers.length)];
    e.style.setProperty('--sx',Math.random()*95+'%');e.style.setProperty('--fd',(5+Math.random()*7)+'s');
    e.style.setProperty('--dl',-Math.random()*3+'s');e.style.setProperty('--sp',(Math.random()*720-360)+'deg');
    e.style.color=colors[Math.floor(Math.random()*colors.length)];e.style.fontSize=(14+Math.random()*18)+'px';
    container.appendChild(e);setTimeout(()=>e.remove(),12000);
  },i*100);
})();
(function loadProgress(){
  const bar=document.getElementById('load-bar');
  const txt=document.getElementById('load-text');
  const phrases=['加载花瓣魔法...','下载 AI 视觉模型...','校准手部追踪...','培育魔法花园...','准备 🦞 绽放...'];
  let p=0;
  function tick(){p+=Math.random()*8+4;if(p>100)p=100;bar.style.width=p+'%';txt.textContent=phrases[Math.min(Math.floor(p/22),phrases.length-1)];
    if(p<100)setTimeout(tick,120+Math.random()*180)}
  tick();
})();

// ==================== Fragment Shader ====================
const FRAG = `
precision highp float;
uniform sampler2D uVideo, uBody;
uniform float uTime, uRes;
uniform vec4 uPC[5];
uniform float uPA[5];
varying vec2 vUv;

float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
float hash2(vec2 p){return fract(sin(dot(p,vec2(269.5,183.3)))*43758.5453);}

float noise(vec2 p){
  vec2 i=floor(p),f=fract(p);
  f=f*f*(3.0-2.0*f);
  return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),
             mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);
}

float fbm(vec2 p){
  float v=0.0,a=0.5;
  for(int i=0;i<4;i++){v+=a*noise(p);p*=2.1;a*=0.5;}
  return v;
}

float cross2(vec2 a,vec2 b,vec2 p){
  return (b.x-a.x)*(p.y-a.y)-(b.y-a.y)*(p.x-a.x);
}

float inQ(vec2 p,vec4 q){
  vec2 a=vec2(q.x,q.y),b=vec2(q.z,q.y),c=vec2(q.z,q.w),d=vec2(q.x,q.w);
  float ab=cross2(a,b,p),bc=cross2(b,c,p),cd=cross2(c,d,p),da=cross2(d,a,p);
  float mn=min(min(ab,bc),min(cd,da));
  float mx=max(max(ab,bc),max(cd,da));
  return smoothstep(-0.002,0.002,min(abs(mn),abs(mx))>0.001?
    (mn>0.0?mn:-mx):(mn<0.0?-mn:mx));
}

float inQ2(vec2 p,vec4 q){
  vec2 a=vec2(q.x,q.y),b=vec2(q.z,q.y),c=vec2(q.z,q.w),d=vec2(q.x,q.w);
  float ab=cross2(a,b,p),bc=cross2(b,c,p),cd=cross2(c,d,p),da=cross2(d,a,p);
  return (ab>=0.0&&bc>=0.0&&cd>=0.0&&da>=0.0)||(ab<=0.0&&bc<=0.0&&cd<=0.0&&da<=0.0)?1.0:0.0;
}

float dSeg(vec2 p,vec2 a,vec2 b){
  vec2 pa=p-a,ba=b-a;
  return length(pa-ba*clamp(dot(pa,ba)/dot(ba,ba),0.0,1.0));
}

float eDist(vec2 p,vec4 q){
  return min(min(dSeg(p,vec2(q.x,q.y),vec2(q.z,q.y)),
                dSeg(p,vec2(q.z,q.y),vec2(q.z,q.w))),
             min(dSeg(p,vec2(q.z,q.w),vec2(q.x,q.w)),
                dSeg(p,vec2(q.x,q.w),vec2(q.x,q.y))));
}

// ---- Watercolor (warm: coral / peach / rose) ----
vec3 fxWater(vec2 uv,float t){
  vec2 d=vec2(fbm(uv*7.0+t*0.35),fbm(uv*7.0+vec2(5.2,3.1)+t*0.35))*0.035;
  vec3 c1=vec3(0.97,0.62,0.52);
  vec3 c2=vec3(0.94,0.78,0.65);
  vec3 c3=vec3(0.92,0.55,0.62);
  float m1=fbm(uv*3.5+t*0.15);
  float m2=fbm(uv*3.5+vec2(3.7,1.2)+t*0.12);
  vec3 col=mix(c1,c2,smoothstep(0.3,0.7,m1));
  col=mix(col,c3,smoothstep(0.4,0.8,m2)*0.5);
  col*=0.8+0.2*fbm(uv*15.0);
  col*=(0.6+0.4*texture2D(uVideo,uv+d).g);
  return col;
}

// ---- Ink Wash (Eastern ink on warm paper) ----
vec3 fxInk(vec2 uv,float t){
  float ink=fbm(uv*6.0+vec2(t*0.15,t*0.1));
  ink=smoothstep(0.22,0.78,ink);
  vec2 wu=uv+vec2(noise(uv*12.0+t*0.5),noise(uv*12.0+vec2(7.3,2.1)+t*0.5))*0.012;
  vec3 vid=texture2D(uVideo,wu).rgb;
  float lum=dot(vid,vec3(0.299,0.587,0.114));
  vec3 paper=vec3(0.95,0.91,0.85)*lum;
  vec3 inkC=vec3(0.06,0.04,0.03);
  vec3 warm=vec3(0.15,0.08,0.05);
  return mix(paper,mix(inkC,warm,0.2),ink*0.75);
}

void main(){
  vec2 uv=vec2(1.0-vUv.x,vUv.y);
  vec3 vid=texture2D(uVideo,uv).rgb;
  float body=texture2D(uBody,uv).r;
  vec3 col=vid;
  float fx=0.0;

  for(int i=0;i<5;i++){
    float act=uPA[i];
    if(act<0.02)continue;
    float iq=inQ2(vUv,uPC[i]);
    if(iq<0.5)continue;

    float sm=smoothstep(0.0,0.05,eDist(vUv,uPC[i]));
    float a=act*sm;
    vec3 ef=vid;

    if(i==0) ef=fxWater(vUv,uTime);
    else if(i==1) ef=fxInk(vUv,uTime);

    float mask=smoothstep(0.25,0.55,body);
    col=mix(col,ef,a*mask*0.85);

    float ed=eDist(vUv,uPC[i]);
    float bd=abs(body-0.5);
    float eg=exp(-ed*30.0)*exp(-bd*8.0)*act;
    float rip=sin(ed*80.0-uTime*4.0)*0.5+0.5;
    vec3 gc=i==0?vec3(1.0,0.85,0.7):vec3(0.5,0.4,0.35);
    col+=gc*eg*rip*0.4;
    fx=max(fx,a);
  }

  col=mix(col,col*vec3(1.02,0.99,0.96),step(0.01,fx));
  gl_FragColor=vec4(col,1.0);
}`;

// ==================== Three.js ====================
const video=document.getElementById('video');
const loading=document.getElementById('loading');
const statusEl=document.getElementById('status');
const scene=new THREE.Scene();
const cam=new THREE.Camera();
const ren=new THREE.WebGLRenderer({antialias:false});
ren.setSize(innerWidth,innerHeight);
ren.setPixelRatio(Math.min(devicePixelRatio,2));
document.body.appendChild(ren.domElement);

const pU={value:Array.from({length:5},()=>new THREE.Vector4(0,0,0,0))};
const pA={value:new Float32Array(5)};

const mat=new THREE.ShaderMaterial({
  depthTest:false,depthWrite:false,
  uniforms:{
    uVideo:{value:null},uBody:{value:null},
    uTime:{value:0},uRes:{value:innerWidth/innerHeight},
    uPC:pU,uPA:pA
  },
  vertexShader:'varying vec2 vUv;void main(){vUv=uv;gl_Position=vec4(position.xy,0.0,1.0);}',
  fragmentShader:FRAG
});
scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2),mat));

// Video texture
const vTex=new THREE.Texture(video);
vTex.minFilter=THREE.LinearFilter;vTex.magFilter=THREE.LinearFilter;
mat.uniforms.uVideo.value=vTex;

// Body mask texture (256x256)
const MS=256,mData=new Uint8Array(MS*MS);
const bTex=new THREE.DataTexture(mData,MS,MS,THREE.RedFormat,THREE.UnsignedByteType);
bTex.minFilter=THREE.LinearFilter;bTex.magFilter=THREE.LinearFilter;
bTex.needsUpdate=true;
mat.uniforms.uBody.value=bTex;

// ==================== MediaPipe ====================
const{HandLandmarker,ImageSegmenter,FilesetResolver}=
  await import("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/vision_bundle.mjs");

const fs=await FilesetResolver.forVisionTasks(
  "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm");

showStatus('加载手部追踪模型...');
const HL=await HandLandmarker.createFromOptions(fs,{
  baseOptions:{
    modelAssetPath:"https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
    delegate:"GPU"},
  runningMode:"VIDEO",numHands:2,
  minHandDetectionConfidence:0.5,minHandPresenceConfidence:0.5,minTrackingConfidence:0.5
});

showStatus('加载人体分割模型...');
const SG=await ImageSegmenter.createFromOptions(fs,{
  baseOptions:{
    modelAssetPath:"https://storage.googleapis.com/mediapipe-models/image_segmenter/selfie_segmenter/float16/latest/selfie_segmenter.tflite",
    delegate:"GPU"},
  runningMode:"VIDEO",outputCategoryMask:false,outputConfidenceMasks:true
});

let lastMask=null;
SG.setOptions({runningMode:"VIDEO",
  resultCallback:(r)=>{
    if(r.categoryMask){
      const d=r.categoryMask.getAsFloat32Array();
      const w=r.categoryMask.width||MS,h=r.categoryMask.height||MS;
      for(let i=0;i<mData.length;i++){
        const sx=i%MS,sy=(i/MS)|0;
        const ox=Math.min((sx/MS*w)|0,w-1);
        const oy=Math.min((sy/MS*h)|0,h-1);
        mData[i]=Math.max(0,Math.min(255,(d[oy*w+ox]*255)|0));
      }
      bTex.needsUpdate=true;
    }
    r.close();
  }
});

// Camera
async function initCam(){
  try{
    const s=await navigator.mediaDevices.getUserMedia({
      video:{width:{ideal:1280},height:{ideal:720},facingMode:'user'}});
    video.srcObject=s;
    await video.play();
    loading.classList.add('hidden');
    showStatus('张开手指即可在身体上绘制艺术滤镜');
    setTimeout(()=>statusEl.classList.remove('show'),3000);
    requestAnimationFrame(loop);
  }catch(e){
    loading.classList.add('hidden');
    document.getElementById('perm').style.display='flex';
  }
}

// ==================== Finger Logic ====================
const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
const dist3=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y,a.z-b.z);
const lerp=(a,b,t)=>a+(b-a)*t;

function isExt(lm,f){
  const T=[[4,3,2],[8,6,5],[12,10,9],[16,14,13],[20,18,17]][f];
  return dist3(lm[T[0]],lm[0])>dist3(lm[T[1]],lm[0])*1.15
    && dist3(lm[T[0]],lm[0])>dist3(lm[T[2]],lm[0])*1.05;
}

function spread(lm,f1,f2){
  const t1=[4,8,12,16,20][f1],t2=[4,8,12,16,20][f2];
  return dist(lm[t1],lm[t2]);
}

// Planes: [fingerA, fingerB, effectIndex, name]
const PP=[[0,1,0,'水彩'],[2,3,1,'墨韵']];
const planes=PP.map(p=>({
  f1:p[0],f2:p[1],ei:p[2],name:p[3],
  corners:new THREE.Vector4(0,0,0,0),
  target:0,smooth:0
}));

function computeP(pl,lm){
  const t1=[4,8,12,16,20][pl.f1],t2=[4,8,12,16,20][pl.f2];
  const p1=lm[t1],p2=lm[t2];
  const dx=p2.x-p1.x,dy=p2.y-p1.y;
  const len=Math.hypot(dx,dy);
  if(len<0.001)return;
  const nx=dx/len,ny=dy/len,px=-ny,py=nx;
  const w=len*0.7;
  pl.corners.set(
    p1.x-px*w, p1.y-py*w,
    p2.x+px*w, p2.y+py*w
  );
}

function activateP(pl,lm){
  const e1=isExt(lm,pl.f1),e2=isExt(lm,pl.f2);
  if(!e1||!e2){pl.target=0;return;}
  pl.target=spread(lm,pl.f1,pl.f2)>0.06?1:0;
}

function smoothP(pl,dt){
  const s=pl.target>pl.smooth?0.12:0.06;
  pl.smooth=lerp(pl.smooth,pl.target,s);
  if(pl.smooth<0.005)pl.smooth=0;
}

// ==================== Loop ====================
let lt=-1,fc=0;

function loop(ts){
  requestAnimationFrame(loop);
  if(video.readyState<2)return;
  if(lt<0)lt=ts;
  const dt=Math.min((ts-lt)/1000,0.05);
  lt=ts;fc++;

  mat.uniforms.uTime.value=ts*0.001;
  vTex.needsUpdate=true;

  const t=performance.now();
  const hr=HL.detectForVideo(video,t);

  for(const pl of planes)pl.target=0;

  if(hr.landmarks){
    for(const lm of hr.landmarks){
      for(const pl of planes){
        activateP(pl,lm);
        if(pl.target>0)computeP(pl,lm);
      }
    }
  }

  for(let i=0;i<planes.length;i++){
    smoothP(planes[i],dt);
    pU.value[i].copy(planes[i].corners);
    pA.value[i]=planes[i].smooth;
  }

  // Body segmentation every 2 frames
  if(fc%2===0){
    try{SG.segmentAsync(video,t);}catch(e){}
  }

  // Zero texture when inactive
  for(let i=0;i<planes.length;i++){
    if(planes[i].smooth<0.005)pU.value[i].set(0,0,0,0);
  }

  ren.render(scene,cam);

  // UI update
  let any=false;
  for(let i=0;i<planes.length;i++){
    const on=planes[i].smooth>0.1;
    document.getElementById('eff-'+PP[i][2]).className='eff'+(on?'':' off');
    if(on)any=true;
  }
  if(any&&statusEl.classList.contains('show'))statusEl.classList.remove('show');
}

// ==================== Utils ====================
function showStatus(t){statusEl.textContent=t;statusEl.classList.add('show');}
window.startCam=initCam;

window.addEventListener('resize',()=>{
  ren.setSize(innerWidth,innerHeight);
  mat.uniforms.uRes.value=innerWidth/innerHeight;
});

initCam();
</script>
</body>
</html>
