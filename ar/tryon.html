---
layout: none
---
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>AR 试戴间</title>
<link rel="stylesheet" href="./shared/arcade-shell.css">
<style>
  #pd-display{position:fixed;left:18px;bottom:90px;z-index:8;padding:12px 16px;border-radius:18px;background:rgba(255,247,232,.92);color:#593a20;border:1px solid rgba(232,201,138,.5);box-shadow:0 14px 34px rgba(0,0,0,.18);max-width:240px}
  #pd-display strong{font-family:Georgia,serif;font-size:1.5rem;color:#e8920c;display:block}
  #pd-display span{font-size:.78rem;line-height:1.5;color:rgba(89,58,32,.7)}
  #prop-selector{position:fixed;right:18px;top:90px;z-index:8;display:flex;flex-direction:column;gap:6px;max-height:60vh;overflow-y:auto;width:130px}
  .prop-btn{padding:8px 10px;border-radius:12px;background:rgba(255,247,232,.7);color:#593a20;border:1px solid rgba(232,201,138,.4);font-size:.78rem;cursor:pointer;text-align:left}
  .prop-btn.active{background:linear-gradient(180deg,#f2c978,#e8920c);color:#fff;border-color:#e8920c}
</style>
<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
</script>
</head>
<body data-ar-mode="boot" data-pd="0" data-current-prop="圆框眼镜">
<video id="video" autoplay playsinline muted></video>
<canvas id="scene"></canvas>
<div id="veil"></div>
<div id="topbar">
  <section id="brand">
    <h1>AR 试戴间</h1>
    <p>实物：你的脸 · 虚拟物体：3D眼镜/帽子/耳环 · 交互：转头实时试戴，自动测瞳距推荐尺寸。解决：网购配饰无法试戴的退货痛点。</p>
  </section>
  <section id="score">
    <div class="stat"><strong id="cur-prop">圆框眼镜</strong><span>当前款式</span></div>
  </section>
</div>
<div id="pd-display" style="display:none">
  <strong id="pd-value">— mm</strong>
  <span id="pd-tip">参考瞳距</span>
</div>
<div id="prop-selector"></div>
<section id="panel">
  <p id="brief">开启摄像头，把脸对准画面。3D眼镜/帽子/耳环会贴合你的脸并随头部转动，自动测量瞳距推荐镜框尺寸。右侧选择款式，点截图保存。解决网购配饰无法试戴的痛点。</p>
  <div id="actions">
    <button class="primary" id="camera">开启摄像头</button>
    <button class="ghost" id="screenshot">截图保存</button>
    <button class="ghost" id="demo">无摄像头演示</button>
    <a class="ghost" href="/ar/" onclick="if(window.parent!==window){event.preventDefault();parent.postMessage({type:'ar:close'},'*')}">返回展区</a>
  </div>
</section>
<div id="permission">
  <div class="perm-card">
    <h2>AR 试戴间</h2>
    <p>用摄像头识别你的脸部（MediaPipe 468 关键点），3D 配饰实时贴合并随头转动，还能测量瞳距推荐尺寸。解决网购配饰试戴的痛点。多摄像头可在下方选择。</p>
    <div id="actions">
      <button class="primary" id="cam2">开启摄像头</button>
      <button class="ghost" id="demo2">无摄像头演示</button>
    </div>
  </div>
</div>
<script type="module" src="./tryon-app.js"></script>
</body>
</html>
