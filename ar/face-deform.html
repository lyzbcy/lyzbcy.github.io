<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>捏脸 AR - AR 体验工坊</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a14; font-family: -apple-system, "SF Pro Text", sans-serif; color: #fff; }
video { display: none; }
#gl-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); }
#overlay-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); pointer-events: none; }
#header { position: fixed; top: 0; left: 0; right: 0; padding: 20px; display: flex; align-items: center; gap: 12px; z-index: 10; }
#back-btn { background: rgba(255,255,255,0.1); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 0.9rem; text-decoration: none; transition: all 0.3s; }
#back-btn:hover { background: rgba(255,255,255,0.2); }
#title { font-size: 1.2rem; font-weight: 700; }
#status { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); backdrop-filter: blur(20px); padding: 12px 24px; border-radius: 30px; font-size: 0.9rem; opacity: 0; transition: opacity 0.5s; z-index: 10; }
#status.show { opacity: 1; }
#controls { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 12px; z-index: 10; }
.ctrl-btn { background: rgba(255,255,255,0.1); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-size: 0.85rem; transition: all 0.3s; }
.ctrl-btn:hover { background: rgba(255,255,255,0.25); }
.ctrl-btn.active { background: rgba(102,126,234,0.5); border-color: rgba(102,126,234,0.8); }
#loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a14; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: opacity 0.5s; }
#loading.hidden { opacity: 0; pointer-events: none; }
.loader { width: 48px; height: 48px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #667eea; border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#loading p { margin-top: 16px; font-size: 0.9rem; opacity: 0.7; }
#perm { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a14; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 99; text-align: center; padding: 20px; }
#perm h2 { margin-bottom: 12px; }
#perm p { opacity: 0.6; margin-bottom: 24px; max-width: 400px; }
#perm button { background: linear-gradient(135deg, #667eea, #764ba2); border: none; color: #fff; padding: 14px 32px; border-radius: 30px; font-size: 1rem; cursor: pointer; }
#hand-indicator { position: fixed; top: 20px; right: 20px; z-index: 10; display: flex; gap: 8px; align-items: center; font-size: 0.8rem; opacity: 0.6; }
#hand-indicator .dot { width: 8px; height: 8px; border-radius: 50%; background: #ff4444; transition: background 0.3s; }
#hand-indicator .dot.active { background: #44ff44; }
</style>
</head>
<body>
<div id="loading"><div class="loader"></div><p>加载面部 + 手部模型...</p></div>
<div id="perm">
  <h2>需要摄像头权限</h2>
  <p>捏脸 AR 需要访问摄像头。用手在脸前推动即可形变面部。</p>
  <button onclick="startCamera()">开启摄像头</button>
</div>
<video id="video" autoplay playsinline></video>
<canvas id="gl-canvas"></canvas>
<canvas id="overlay-canvas"></canvas>
<div id="header">
  <a id="back-btn" href="/ar/">← 返回</a>
  <div id="title">捏脸 AR</div>
</div>
<div id="hand-indicator">
  <div class="dot" id="dot-face"></div> <span>面部</span>
  <div class="dot" id="dot-hand"></div> <span>手部</span>
</div>
<div id="status">用手在脸前推动即可形变</div>
<div id="controls">
  <button class="ctrl-btn" onclick="resetDeform()">重置形变</button>
  <button class="ctrl-btn" id="meshToggle" onclick="toggleMesh()">显示网格</button>
  <button class="ctrl-btn" onclick="cycleStrength()">形变力度: 中</button>
</div>

<script type="module">
import { FaceLandmarker, HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/vision_bundle.mjs";

// ====== DOM ======
const video = document.getElementById('video');
const glCanvas = document.getElementById('gl-canvas');
const overlayCanvas = document.getElementById('overlay-canvas');
const overlayCtx = overlayCanvas.getContext('2d');
const loading = document.getElementById('loading');
const status = document.getElementById('status');
const dotFace = document.getElementById('dot-face');
const dotHand = document.getElementById('dot-hand');

// ====== WebGL 初始化 ======
const gl = glCanvas.getContext('webgl', { premultipliedAlpha: false, preserveDrawingBuffer: false });
if (!gl) { loading.innerHTML = '<p style="color:#ff6b6b">WebGL 不可用</p>'; throw new Error('No WebGL'); }

// Vertex shader - 全屏四边形
const vsSource = `
attribute vec2 aPosition;
varying vec2 vTexCoord;
void main() {
  vTexCoord = aPosition * 0.5 + 0.5;
  gl_Position = vec4(aPosition, 0.0, 1.0);
}`;

// Fragment shader - 视频纹理 + 位移场采样
const fsSource = `
precision mediump float;
uniform sampler2D uVideo;
uniform sampler2D uDisp;
uniform float uMaxOffset;
uniform float uShowGrid;
varying vec2 vTexCoord;
void main() {
  vec2 disp = texture2D(uDisp, vTexCoord).rg;
  vec2 offset = (disp - 0.5) * 2.0 * uMaxOffset;
  vec2 sampleCoord = vTexCoord + offset;
  sampleCoord = clamp(sampleCoord, 0.0, 1.0);
  gl_FragColor = texture2D(uVideo, sampleCoord);
}`;

function compileShader(src, type) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(s));
    gl.deleteShader(s);
    return null;
  }
  return s;
}

const vs = compileShader(vsSource, gl.VERTEX_SHADER);
const fs = compileShader(fsSource, gl.FRAGMENT_SHADER);
const program = gl.createProgram();
gl.attachShader(program, vs);
gl.attachShader(program, fs);
gl.linkProgram(program);
gl.useProgram(program);

// 全屏四边形
const quad = new Float32Array([-1,-1, 1,-1, -1,1, 1,1]);
const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, quad, gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(program, 'aPosition');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

// Uniform locations
const uVideo = gl.getUniformLocation(program, 'uVideo');
const uDisp = gl.getUniformLocation(program, 'uDisp');
const uMaxOffset = gl.getUniformLocation(program, 'uMaxOffset');

// 视频纹理
const videoTex = gl.createTexture();
gl.activeTexture(gl.TEXTURE0);
gl.bindTexture(gl.TEXTURE_2D, videoTex);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
gl.uniform1i(uVideo, 0);

// 位移场纹理
const dispTex = gl.createTexture();
gl.activeTexture(gl.TEXTURE1);
gl.bindTexture(gl.TEXTURE_2D, dispTex);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
gl.uniform1i(uDisp, 1);

// ====== 位移场 ======
let DW = 160, DH = 120; // 位移场分辨率（低分辨率，GPU 插值放大）
let dispData = new Uint8Array(DW * DH * 4); // RGBA, R=dx, G=dy, 128=无偏移
// 初始化中心值 128
for (let i = 0; i < DW * DH; i++) {
  dispData[i * 4] = 128;     // R
  dispData[i * 4 + 1] = 128; // G
  dispData[i * 4 + 2] = 0;
  dispData[i * 4 + 3] = 255;
}

// 形变参数
let strengthLevel = 1; // 0=小, 1=中, 2=大
const strengthValues = [0.015, 0.035, 0.06];
const strengthLabels = ['小', '中', '大'];
let showMesh = false;

// ====== MediaPipe 模型 ======
let faceLandmarker = null, handLandmarker = null;
let lastFaceResults = null;
let prevHandPositions = []; // 上一帧手部位置 [{x, y, idx}]

async function init() {
  try {
    const vision = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm"
    );
    // 同时创建面部和手部检测器
    faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
        delegate: "GPU"
      },
      runningMode: "VIDEO",
      numFaces: 1,
      outputFaceBlendshapes: false,
      outputFacialTransformationMatrixes: false
    });
    handLandmarker = await HandLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
        delegate: "GPU"
      },
      runningMode: "VIDEO",
      numHands: 2
    });
    loading.classList.add('hidden');
    showStatus('模型加载完成，启动摄像头...');
    await startCamera();
  } catch (e) {
    console.error(e);
    loading.innerHTML = '<p style="color:#ff6b6b">加载失败: ' + e.message + '</p>';
  }
}

window.startCamera = async function() {
  document.getElementById('perm').style.display = 'none';
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
    });
    video.srcObject = stream;
    video.onloadedmetadata = () => {
      const vw = video.videoWidth, vh = video.videoHeight;
      glCanvas.width = vw; glCanvas.height = vh;
      overlayCanvas.width = vw; overlayCanvas.height = vh;
      gl.viewport(0, 0, vw, vh);
      showStatus('用手在脸前推动即可形变面部');
      detect();
    };
  } catch (e) {
    document.getElementById('perm').style.display = 'flex';
  }
};

// ====== 检测循环 ======
let lastDetectTime = -1;
function detect() {
  if (video.readyState < 2) { requestAnimationFrame(detect); return; }
  const now = performance.now();
  if (now - lastDetectTime < 45) { requestAnimationFrame(detect); return; } // ~22fps
  lastDetectTime = now;

  // 面部检测
  const faceRes = faceLandmarker.detectForVideo(video, now);
  lastFaceResults = faceRes;
  dotFace.classList.toggle('active', faceRes.faceLandmarks && faceRes.faceLandmarks.length > 0);

  // 手部检测
  const handRes = handLandmarker.detectForVideo(video, now);
  dotHand.classList.toggle('active', handRes.landmarks && handRes.landmarks.length > 0);

  // 处理手部形变
  processHandDeform(faceRes, handRes);

  // 衰减位移场
  decayDisplacement();

  // 渲染
  renderFrame();
  drawOverlay(faceRes);

  requestAnimationFrame(detect);
}

// ====== 手部驱动形变 ======
function processHandDeform(faceRes, handRes) {
  if (!faceRes.faceLandmarks || faceRes.faceLandmarks.length === 0) {
    prevHandPositions = [];
    return;
  }
  if (!handRes.landmarks || handRes.landmarks.length === 0) {
    prevHandPositions = [];
    return;
  }

  const face = faceRes.faceLandmarks[0];
  // 计算面部边界框
  let fMinX = 1, fMaxX = 0, fMinY = 1, fMaxY = 0;
  for (const lm of face) {
    if (lm.x < fMinX) fMinX = lm.x;
    if (lm.x > fMaxX) fMaxX = lm.x;
    if (lm.y < fMinY) fMinY = lm.y;
    if (lm.y > fMaxY) fMaxY = lm.y;
  }
  const fCenterX = (fMinX + fMaxX) / 2;
  const fCenterY = (fMinY + fMaxY) / 2;
  const fWidth = fMaxX - fMinX;
  const fHeight = fMaxY - fMinY;
  const fRadius = Math.max(fWidth, fHeight) * 0.6;

  const currentPositions = [];

  for (let h = 0; h < handRes.landmarks.length; h++) {
    const hand = handRes.landmarks[h];
    // 食指指尖 landmark[8] 作为推动点
    const tip = hand[8];
    const thumb = hand[4];
    // 用食指和拇指的平均位置作为推动中心
    const px = (tip.x + thumb.x) / 2;
    const py = (tip.y + thumb.y) / 2;

    currentPositions.push({ x: px, y: py, idx: h });

    // 检查手是否在面部区域内
    const distToFace = Math.sqrt((px - fCenterX) ** 2 + (py - fCenterY) ** 2);
    if (distToFace > fRadius * 1.5) continue;

    // 查找上一帧同一只手的位置
    const prev = prevHandPositions.find(p => p.idx === h);
    if (!prev) continue;

    // 计算移动向量
    const dx = px - prev.x;
    const dy = py - prev.y;
    const speed = Math.sqrt(dx * dx + dy * dy);
    if (speed < 0.003) continue; // 最小速度阈值

    // 注入位移到面部区域的位移场
    const maxOff = strengthValues[strengthLevel];
    injectDisplacement(px, py, dx, dy, fRadius * 0.5, maxOff);
  }

  prevHandPositions = currentPositions;
}

function injectDisplacement(cx, cy, dx, dy, radius, maxOffset) {
  // 将归一化坐标转为位移场坐标
  const fieldCx = Math.floor(cx * DW);
  const fieldCy = Math.floor(cy * DH);
  const fieldR = Math.max(3, Math.floor(radius * Math.max(DW, DH)));

  // 将位移映射到 [0, 255] 范围
  const normDx = Math.max(-1, Math.min(1, dx / maxOffset));
  const normDy = Math.max(-1, Math.min(1, dy / maxOffset));

  for (let fy = Math.max(0, fieldCy - fieldR); fy < Math.min(DH, fieldCy + fieldR); fy++) {
    for (let fx = Math.max(0, fieldCx - fieldR); fx < Math.min(DW, fieldCx + fieldR); fx++) {
      const distX = (fx - fieldCx) / fieldR;
      const distY = (fy - fieldCy) / fieldR;
      const dist = Math.sqrt(distX * distX + distY * distY);
      if (dist > 1) continue;

      // 高斯衰减
      const sigma = 0.4;
      const influence = Math.exp(-(dist * dist) / (2 * sigma * sigma));

      const idx = (fy * DW + fx) * 4;
      // 累加位移（映射到 128 中心）
      const addDx = normDx * influence * 20;
      const addDy = normDy * influence * 20;
      dispData[idx] = Math.max(0, Math.min(255, dispData[idx] + addDx));
      dispData[idx + 1] = Math.max(0, Math.min(255, dispData[idx + 1] + addDy));
    }
  }
}

function decayDisplacement() {
  // 弹性衰减：向 128 中心回归
  for (let i = 0; i < DW * DH; i++) {
    const idx = i * 4;
    dispData[idx] = Math.round(128 + (dispData[idx] - 128) * 0.96);
    dispData[idx + 1] = Math.round(128 + (dispData[idx + 1] - 128) * 0.96);
  }
}

// ====== WebGL 渲染 ======
function renderFrame() {
  // 更新视频纹理
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, videoTex);
  gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, video);

  // 更新位移场纹理
  gl.activeTexture(gl.TEXTURE1);
  gl.bindTexture(gl.TEXTURE_2D, dispTex);
  gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, false);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, DW, DH, 0, gl.RGBA, gl.UNSIGNED_BYTE, dispData);

  gl.uniform1f(uMaxOffset, strengthValues[strengthLevel]);

  // 绘制
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

// ====== 网格叠加层 (Canvas 2D) ======
const FACE_OVAL = [10,338,297,332,284,251,389,356,454,323,361,288,397,365,379,378,400,377,152,148,176,149,150,136,172,58,132,93,234,127,162,21,54,103,67,109];
const LEFT_EYE = [33,7,163,144,145,153,154,155,133,173,157,158,159,160,161,246];
const RIGHT_EYE = [362,382,381,380,374,373,390,249,263,466,388,387,386,385,384,398];
const LIPS = [61,146,91,181,84,17,314,405,321,375,291,409,270,269,267,0,37,39,40,185];
const NOSE = [168,6,197,195,5,4];

function drawOverlay(results) {
  overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
  if (!showMesh || !results.faceLandmarks || results.faceLandmarks.length === 0) return;

  const face = results.faceLandmarks[0];
  const w = overlayCanvas.width, h = overlayCanvas.height;

  // 绘制面部轮廓和特征
  overlayCtx.strokeStyle = '#667eea';
  overlayCtx.lineWidth = 1.5;
  overlayCtx.globalAlpha = 0.6;
  drawPoly(face, FACE_OVAL, w, h, true);
  drawPoly(face, LEFT_EYE, w, h, true);
  drawPoly(face, RIGHT_EYE, w, h, true);
  drawPoly(face, LIPS, w, h, true);
  drawPoly(face, NOSE, w, h, false);

  // 绘制关键点
  overlayCtx.fillStyle = '#f093fb';
  overlayCtx.globalAlpha = 0.5;
  for (let i = 0; i < face.length; i += 5) {
    const x = face[i].x * w, y = face[i].y * h;
    overlayCtx.beginPath();
    overlayCtx.arc(x, y, 1.5, 0, Math.PI * 2);
    overlayCtx.fill();
  }

  // 绘制手部位置
  overlayCtx.globalAlpha = 0.8;
  if (prevHandPositions.length > 0) {
    for (const hp of prevHandPositions) {
      const x = hp.x * w, y = hp.y * h;
      overlayCtx.beginPath();
      overlayCtx.arc(x, y, 20, 0, Math.PI * 2);
      overlayCtx.strokeStyle = '#43e97b';
      overlayCtx.lineWidth = 2;
      overlayCtx.stroke();
      // 发光
      const grad = overlayCtx.createRadialGradient(x, y, 0, x, y, 40);
      grad.addColorStop(0, 'rgba(67,233,123,0.3)');
      grad.addColorStop(1, 'transparent');
      overlayCtx.fillStyle = grad;
      overlayCtx.fill();
    }
  }
  overlayCtx.globalAlpha = 1;
}

function drawPoly(landmarks, indices, w, h, closed) {
  overlayCtx.beginPath();
  for (let i = 0; i < indices.length; i++) {
    const lm = landmarks[indices[i]];
    const x = lm.x * w, y = lm.y * h;
    if (i === 0) overlayCtx.moveTo(x, y);
    else overlayCtx.lineTo(x, y);
  }
  if (closed) overlayCtx.closePath();
  overlayCtx.stroke();
}

// ====== 控制函数 ======
window.resetDeform = function() {
  for (let i = 0; i < DW * DH; i++) {
    dispData[i * 4] = 128;
    dispData[i * 4 + 1] = 128;
  }
  showStatus('形变已重置');
};

window.toggleMesh = function() {
  showMesh = !showMesh;
  document.getElementById('meshToggle').classList.toggle('active');
  document.getElementById('meshToggle').textContent = showMesh ? '隐藏网格' : '显示网格';
};

window.cycleStrength = function() {
  strengthLevel = (strengthLevel + 1) % 3;
  showStatus('形变力度: ' + strengthLabels[strengthLevel]);
};

function showStatus(msg) {
  status.textContent = msg;
  status.classList.add('show');
  clearTimeout(status._timer);
  status._timer = setTimeout(() => status.classList.remove('show'), 2500);
}

init();
</script>
</body>
</html>
