<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>AR 护脊官</title>
<link rel="stylesheet" href="./shared/arcade-shell.css">
<style>
  #posture-hud{position:fixed;left:18px;bottom:90px;z-index:8;padding:14px 18px;border-radius:18px;background:rgba(255,247,232,.94);color:#593a20;border:1px solid rgba(232,201,138,.5);box-shadow:0 14px 34px rgba(0,0,0,.18);min-width:200px}
  #posture-hud .label{font-size:.72rem;color:rgba(89,58,32,.6);letter-spacing:.08em}
  #posture-hud .score{font-family:Georgia,serif;font-size:2.2rem;line-height:1;color:#e8920c;margin:4px 0}
  #posture-hud .score.bad{color:#e74c3c}
  #posture-hud .tip{font-size:.82rem;line-height:1.5;margin-top:6px}
  #mode-switch{position:fixed;right:18px;top:90px;z-index:8;display:flex;gap:8px}
  #mode-switch button{padding:10px 16px;border-radius:999px;border:1px solid rgba(232,201,138,.5);background:rgba(255,247,232,.7);color:#593a20;cursor:pointer;font-size:.85rem}
  #mode-switch button.active{background:linear-gradient(180deg,#f2c978,#e8920c);color:#fff}
  #fitness-controls{position:fixed;right:18px;top:150px;z-index:8;display:none;flex-direction:column;gap:6px;width:120px}
  #fitness-controls.show{display:flex}
  #fitness-controls button{padding:8px;border-radius:12px;background:rgba(16,22,30,.6);color:#fff7e8;border:1px solid rgba(255,255,255,.15);cursor:pointer;font-size:.78rem}
  #fitness-controls button.active{background:rgba(242,201,120,.4);border-color:#f2c978}
</style>
<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
</script>
</head>
<body data-ar-mode="boot" data-posture-score="0" data-reps="0" data-mode="office">
<video id="video" autoplay playsinline muted></video>
<canvas id="scene"></canvas>
<div id="veil"></div>
<div id="topbar">
  <section id="brand">
    <h1>AR 护脊官</h1>
    <p>实物：你的身体 · 虚拟物体：彩色骨骼、角度、警告标记 · 交互：实时体态监测纠错。解决：久坐驼背、颈椎病、健身动作错误伤身。</p>
  </section>
  <section id="score">
    <div class="stat"><strong id="reps-stat">0</strong><span>次数/坐直分</span></div>
  </section>
</div>
<div id="mode-switch">
  <button id="mode-office" class="active">办公护脊</button>
  <button id="mode-fitness">健身纠错</button>
</div>
<div id="fitness-controls">
  <button data-action="squat" class="active">深蹲</button>
  <button data-action="pushup">俯卧撑</button>
  <button data-action="curl">弯举</button>
</div>
<div id="posture-hud" style="display:none">
  <div class="label" id="hud-label">体态评分</div>
  <div class="score" id="hud-score">—</div>
  <div class="tip" id="hud-tip">开启摄像头开始监测</div>
</div>
<section id="panel">
  <p id="brief">开启摄像头，全身入镜。办公模式实时监测头前倾/驼背/耸肩并提醒坐直；健身模式纠正深蹲/俯卧撑/弯举动作。解决久坐驼背与健身伤身的痛点。</p>
  <div id="actions">
    <button class="primary" id="camera">开启摄像头</button>
    <button class="ghost" id="demo">无摄像头演示</button>
    <a class="ghost" href="/ar/" onclick="if(window.parent!==window){event.preventDefault();parent.postMessage({type:'ar:close'},'*')}">返回展区</a>
  </div>
</section>
<div id="permission">
  <div class="perm-card">
    <h2>AR 护脊官</h2>
    <p>用摄像头识别你的身体姿态（MediaPipe 33 关键点骨骼），办公模式监测坐姿防驼背，健身模式纠正动作防受伤。解决久坐与健身伤身的痛点。多摄像头可在下方选择。</p>
    <div id="actions">
      <button class="primary" id="cam2">开启摄像头</button>
      <button class="ghost" id="demo2">无摄像头演示</button>
    </div>
  </div>
</div>
<script type="module" src="./posture-app.js"></script>
</body>
</html>
