<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>😎 表情消消乐 | AR游戏厅</title>
<style>
:root{--neon-pink:#ff2d95;--neon-cyan:#0ff;--neon-yellow:#ffe600;--bg:#0a0a0f;--panel:#111122}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg);color:#e0e0f0;
  font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:20px;
}
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px);
}
.header{
  text-align:center;margin:20px 0 30px;
}
.header h1{font-size:clamp(24px,5vw,40px);font-weight:900;
  background:linear-gradient(180deg,var(--neon-cyan),var(--neon-pink));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.header .sub{font-size:13px;letter-spacing:.3em;color:var(--neon-cyan);opacity:.7;font-family:'Courier New',monospace}
.back-btn{
  position:fixed;top:20px;left:20px;z-index:100;
  background:var(--panel);border:1px solid rgba(255,255,255,.15);
  color:var(--neon-cyan);padding:10px 18px;border-radius:25px;
  cursor:pointer;font-size:14px;letter-spacing:.05em;
  transition:all .3s;text-decoration:none;
}
.back-btn:hover{border-color:var(--neon-cyan);box-shadow:0 0 20px rgba(0,255,255,.2)}
.game-area{
  position:relative;z-index:1;
  display:flex;flex-direction:column;align-items:center;
  gap:20px;
}
.stats{
  display:flex;gap:30px;align-items:center;
  font-family:'Courier New',monospace;
  font-size:15px;letter-spacing:.1em;
}
.stat-item{display:flex;align-items:center;gap:8px}
.stat-label{color:rgba(255,255,255,.5)}
.stat-value{color:var(--neon-cyan);font-weight:700}
.best{color:var(--neon-yellow)}
.grid{
  display:grid;gap:10px;
  grid-template-columns:repeat(4,1fr);
  max-width:420px;width:100%;
}
.card{
  aspect-ratio:1;
  background:var(--panel);
  border:2px solid rgba(255,255,255,.08);
  border-radius:12px;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(28px,8vw,44px);
  transition:all .2s;
  position:relative;
  transform-style:preserve-3d;
  transition:transform .5s;
}
.card:hover:not(.flipped):not(.matched){
  border-color:var(--neon-cyan);
  box-shadow:0 0 15px rgba(0,255,255,.2);
}
.card.flipped,.card.matched{
  transform:rotateY(180deg);
}
.card-inner{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  backface-visibility:hidden;
}
.card-front{
  font-size:24px;color:rgba(255,255,255,.3);
}
.card-back{
  transform:rotateY(180deg);
}
.card.matched{
  border-color:var(--neon-green) !important;
  box-shadow:0 0 20px rgba(57,255,20,.3) !important;
  animation:matchPulse .5s ease-out;
}
@keyframes matchPulse{
  0%{transform:rotateY(180deg) scale(1)}
  50%{transform:rotateY(180deg) scale(1.1)}
  100%{transform:rotateY(180deg) scale(1)}
}
.card.wrong{animation:shake .4s ease}
@keyframes shake{
  0%,100%{transform:rotateY(180deg) translateX(0)}
  25%{transform:rotateY(180deg) translateX(-8px)}
  75%{transform:rotateY(180deg) translateX(8px)}
}
.controls{
  display:flex;gap:15px;flex-wrap:wrap;justify-content:center;
}
.btn{
  padding:12px 28px;border-radius:25px;
  font-size:15px;font-weight:600;letter-spacing:.05em;
  cursor:pointer;transition:all .3s;
  background:transparent;
  border:2px solid var(--neon-cyan);
  color:var(--neon-cyan);
  font-family:inherit;
}
.btn:hover{
  background:var(--neon-cyan);color:var(--bg);
  box-shadow:0 0 30px rgba(0,255,255,.4);
}
.btn.pink{border-color:var(--neon-pink);color:var(--neon-pink)}
.btn.pink:hover{background:var(--neon-pink);color:var(--bg);box-shadow:0 0 30px rgba(255,45,149,.4)}
.win-overlay{
  position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,.85);
  display:flex;align-items:center;justify-content:center;
  opacity:0;visibility:hidden;transition:all .5s;
}
.win-overlay.show{opacity:1;visibility:visible}
.win-card{
  background:var(--panel);border:2px solid var(--neon-yellow);
  border-radius:20px;padding:40px;text-align:center;
  max-width:400px;width:90%;
  box-shadow:0 0 60px rgba(255,230,0,.15);
}
.win-card .trophy{font-size:60px;margin-bottom:10px}
.win-card h2{font-size:28px;margin-bottom:8px;color:var(--neon-yellow)}
.win-card .score{font-size:18px;color:rgba(255,255,255,.6);margin-bottom:20px}
.win-card .record{color:var(--neon-pink);font-weight:700;margin-bottom:20px}
@media(max-width:500px){
  .grid{gap:6px;max-width:340px}
  .card{border-radius:8px}
  .stats{gap:15px;font-size:13px}
}
</style>
</head>
<body>

<a href="ar-game-lobby.html" class="back-btn">← 返回大厅</a>

<div class="header">
  <h1>😎 表情消消乐</h1>
  <p class="sub">EMOJI MATCH · 记忆挑战</p>
</div>

<div class="game-area">
  <div class="stats">
    <div class="stat-item"><span class="stat-label">步数</span><span class="stat-value" id="moves">0</span></div>
    <div class="stat-item"><span class="stat-label">配对</span><span class="stat-value" id="pairs">0/8</span></div>
    <div class="stat-item"><span class="stat-label">最佳</span><span class="stat-value best" id="bestScore">-</span></div>
  </div>
  <div class="grid" id="grid"></div>
  <div class="controls">
    <button class="btn" onclick="resetGame(8)">🔄 简单 (4×4)</button>
    <button class="btn pink" onclick="resetGame(12)">🔥 困难 (4×6)</button>
  </div>
</div>

<div class="win-overlay" id="winOverlay">
  <div class="win-card">
    <div class="trophy">🏆</div>
    <h2>恭喜通关！</h2>
    <p class="score" id="winScore"></p>
    <p class="record" id="winRecord"></p>
    <button class="btn pink" onclick="resetGame(currentPairs)">🔄 再来一局</button>
  </div>
</div>

<script>
const emojiPool = ['😎','🤩','🥳','😍','🦞','💎','🎮','🕹️','👾','🌟','🔥','💖','🍕','🎉','🦄','🌈','🍩','🎸','🦋','🌸'];

let cards = [];
let flippedCards = [];
let matchedPairs = 0;
let totalPairs = 8;
let moves = 0;
let currentPairs = 8;
let lockBoard = false;

function resetGame(pairs) {
  currentPairs = pairs;
  totalPairs = pairs;
  matchedPairs = 0;
  moves = 0;
  flippedCards = [];
  lockBoard = false;
  
  document.getElementById('moves').textContent = '0';
  document.getElementById('pairs').textContent = `0/${pairs}`;
  document.getElementById('winOverlay').classList.remove('show');
  
  // Select random emoji pairs
  const selected = [...emojiPool].sort(() => Math.random() - 0.5).slice(0, pairs);
  cards = [...selected, ...selected].sort(() => Math.random() - 0.5);
  
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('grid');
  const cols = totalPairs === 8 ? 4 : 6;
  grid.style.gridTemplateColumns = `repeat(${cols},1fr)`;
  grid.innerHTML = '';
  
  cards.forEach((emoji, index) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.index = index;
    card.dataset.emoji = emoji;
    
    const front = document.createElement('div');
    front.className = 'card-inner card-front';
    front.textContent = '?';
    
    const back = document.createElement('div');
    back.className = 'card-inner card-back';
    back.textContent = emoji;
    
    card.appendChild(front);
    card.appendChild(back);
    card.addEventListener('click', () => flipCard(card));
    
    grid.appendChild(card);
  });
}

function flipCard(card) {
  if (lockBoard) return;
  if (card.classList.contains('flipped') || card.classList.contains('matched')) return;
  if (flippedCards.length >= 2) return;
  
  card.classList.add('flipped');
  flippedCards.push(card);
  
  if (flippedCards.length === 2) {
    moves++;
    document.getElementById('moves').textContent = moves;
    checkMatch();
  }
}

function checkMatch() {
  const [card1, card2] = flippedCards;
  
  if (card1.dataset.emoji === card2.dataset.emoji) {
    // Match!
    card1.classList.add('matched');
    card2.classList.add('matched');
    matchedPairs++;
    document.getElementById('pairs').textContent = `${matchedPairs}/${totalPairs}`;
    flippedCards = [];
    
    if (matchedPairs === totalPairs) {
      setTimeout(showWin, 600);
    }
  } else {
    // No match
    lockBoard = true;
    card1.classList.add('wrong');
    card2.classList.add('wrong');
    setTimeout(() => {
      card1.classList.remove('flipped', 'wrong');
      card2.classList.remove('flipped', 'wrong');
      flippedCards = [];
      lockBoard = false;
    }, 800);
  }
}

function showWin() {
  const best = localStorage.getItem('emojiMatchBest' + totalPairs);
  let isNewRecord = false;
  
  if (!best || moves < parseInt(best)) {
    localStorage.setItem('emojiMatchBest' + totalPairs, moves);
    document.getElementById('bestScore').textContent = moves;
    isNewRecord = true;
  }
  
  document.getElementById('winScore').textContent = `用了 ${moves} 步完成 ${totalPairs} 对配对！`;
  document.getElementById('winRecord').textContent = isNewRecord ? '🎉 新纪录！' : `最佳记录：${best || moves} 步`;
  document.getElementById('winOverlay').classList.add('show');
}

// Load best score
const savedBest = localStorage.getItem('emojiMatchBest8');
if (savedBest) document.getElementById('bestScore').textContent = savedBest;

// Start game
resetGame(8);
</script>
</body>
</html>
