<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>🐍 霓虹贪吃蛇 | AR游戏厅</title>
<style>
:root{--neon-pink:#ff2d95;--neon-cyan:#0ff;--neon-yellow:#ffe600;--neon-green:#39ff14;--bg:#0a0a0f;--panel:#111122}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg);color:#e0e0f0;
  font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:15px;overflow:hidden;
}
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px);
}
.header{
  text-align:center;margin:10px 0;position:relative;z-index:1;
}
.header h1{font-size:clamp(22px,4vw,32px);font-weight:900;
  background:linear-gradient(180deg,var(--neon-green),var(--neon-cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.header .sub{font-size:12px;letter-spacing:.3em;color:var(--neon-cyan);opacity:.7;font-family:'Courier New',monospace}
.back-btn{
  position:fixed;top:15px;left:15px;z-index:100;
  background:var(--panel);border:1px solid rgba(255,255,255,.15);
  color:var(--neon-cyan);padding:8px 16px;border-radius:20px;
  cursor:pointer;font-size:13px;letter-spacing:.05em;
  transition:all .3s;text-decoration:none;
}
.back-btn:hover{border-color:var(--neon-cyan);box-shadow:0 0 20px rgba(0,255,255,.2)}
canvas{border:1px solid rgba(255,255,255,.06);border-radius:8px;position:relative;z-index:1}
.stats{
  position:relative;z-index:1;display:flex;gap:20px;margin:8px 0;
  font-family:'Courier New',monospace;font-size:14px;
}
.stat-item{display:flex;align-items:center;gap:6px}
.stat-label{color:rgba(255,255,255,.5)}
.stat-value{color:var(--neon-green);font-weight:700}
.controls{
  position:relative;z-index:1;margin-top:8px;display:flex;gap:8px;
}
.btn{
  padding:8px 18px;border-radius:18px;font-size:12px;font-weight:600;letter-spacing:.05em;
  cursor:pointer;transition:all .3s;background:transparent;
  border:2px solid var(--neon-cyan);color:var(--neon-cyan);font-family:inherit;
}
.btn:hover{background:var(--neon-cyan);color:var(--bg);box-shadow:0 0 20px rgba(0,255,255,.4)}
.btn.pink{border-color:var(--neon-pink);color:var(--neon-pink)}
.btn.pink:hover{background:var(--neon-pink);color:var(--bg);box-shadow:0 0 20px rgba(255,45,149,.4)}
.dpad{
  display:none;position:relative;z-index:1;margin-top:10px;
  width:140px;height:140px;
}
.dpad-btn{
  position:absolute;width:44px;height:44px;border-radius:10px;
  border:1px solid rgba(0,255,255,.3);background:rgba(0,255,255,.08);
  color:var(--neon-cyan);font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.dpad-btn:active{background:var(--neon-cyan);color:var(--bg)}
.d-up{top:0;left:48px}
.d-down{bottom:0;left:48px}
.d-left{top:48px;left:0}
.d-right{top:48px;right:0}
@media(max-width:768px){
  .dpad{display:block}
}
.instruction{
  text-align:center;margin-top:6px;position:relative;z-index:1;
  font-size:11px;color:rgba(255,255,255,.3);letter-spacing:.08em;
}
</style>
</head>
<body>

<a href="ar-game-lobby.html" class="back-btn">← 返回大厅</a>

<div class="header">
  <h1>🐍 霓虹贪吃蛇</h1>
  <p class="sub">NEON SNAKE · CYBERPUNK EDITION</p>
</div>

<div class="stats">
  <div class="stat-item"><span class="stat-label">🍎 分数</span><span class="stat-value" id="snakeScore">0</span></div>
  <div class="stat-item"><span class="stat-label">📏 长度</span><span class="stat-value" id="snakeLength">3</span></div>
  <div class="stat-item"><span class="stat-label">🏆 最佳</span><span class="stat-value" style="color:var(--neon-yellow)" id="snakeBest">0</span></div>
</div>

<canvas id="snakeCanvas"></canvas>

<div class="dpad" id="dpad">
  <button class="dpad-btn d-up" id="dUp">▲</button>
  <button class="dpad-btn d-down" id="dDown">▼</button>
  <button class="dpad-btn d-left" id="dLeft">◀</button>
  <button class="dpad-btn d-right" id="dRight">▶</button>
</div>

<div class="controls">
  <button class="btn" onclick="resetSnake()">🔄 重新开始</button>
  <button class="btn pink" onclick="toggleSnakePause()">⏯️ 暂停</button>
</div>

<p class="instruction">方向键 / WASD / 触屏滑动控制方向</p>

<script>
const canvas = document.getElementById('snakeCanvas');
const ctx = canvas.getContext('2d');

const GRID = 20;
let gridW, gridH;

function resizeSnake() {
  const maxW = Math.min(window.innerWidth - 20, 500);
  const maxH = Math.min(window.innerHeight - 350, 500);
  gridW = Math.floor(maxW / GRID);
  gridH = Math.floor(maxH / GRID);
  canvas.width = gridW * GRID;
  canvas.height = gridH * GRID;
}
resizeSnake();
window.addEventListener('resize', resizeSnake);

// Snake
let snake, food, bonus, bonusTimer;
let dir, nextDir;
let score, gameRunning, gamePaused;
let speed, gameLoopId;
let particles = [];
let gridPulse = 0;

function resetSnake() {
  const cx = Math.floor(gridW / 2);
  const cy = Math.floor(gridH / 2);
  snake = [
    {x: cx, y: cy},
    {x: cx - 1, y: cy},
    {x: cx - 2, y: cy}
  ];
  dir = {x: 1, y: 0};
  nextDir = {x: 1, y: 0};
  score = 0;
  speed = 120;
  gameRunning = true;
  gamePaused = false;
  particles = [];
  food = spawnFood();
  bonus = null;
  bonusTimer = 0;
  updateUI();
}

function spawnFood() {
  let pos;
  do {
    pos = {x: Math.floor(Math.random() * gridW), y: Math.floor(Math.random() * gridH)};
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  return pos;
}

function spawnBonus() {
  if (bonus) return;
  let pos;
  do {
    pos = {x: Math.floor(Math.random() * gridW), y: Math.floor(Math.random() * gridH)};
  } while (
    snake.some(s => s.x === pos.x && s.y === pos.y) ||
    (food.x === pos.x && food.y === pos.y)
  );
  bonus = pos;
  bonusTimer = 50; // ticks before disappearing
}

function spawnParticle(x, y, color) {
  for (let i = 0; i < 6; i++) {
    particles.push({
      x: x * GRID + GRID/2, y: y * GRID + GRID/2,
      vx: (Math.random() - 0.5) * 3,
      vy: (Math.random() - 0.5) * 3,
      life: 1, decay: 0.03 + Math.random() * 0.02,
      color
    });
  }
}

function updateUI() {
  document.getElementById('snakeScore').textContent = score;
  document.getElementById('snakeLength').textContent = snake.length;
  const best = localStorage.getItem('snakeBest') || 0;
  document.getElementById('snakeBest').textContent = Math.max(score, best);
}

function update() {
  if (!gameRunning || gamePaused) return;
  
  dir = nextDir;
  
  // Move head
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
  
  // Wall collision - wrap around
  if (head.x < 0) head.x = gridW - 1;
  if (head.x >= gridW) head.x = 0;
  if (head.y < 0) head.y = gridH - 1;
  if (head.y >= gridH) head.y = 0;
  
  // Self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    gameOver();
    return;
  }
  
  snake.unshift(head);
  
  // Eat food
  let ate = false;
  if (head.x === food.x && head.y === food.y) {
    score += 10;
    spawnParticle(food.x, food.y, '#39ff14');
    food = spawnFood();
    ate = true;
    // Speed up
    if (speed > 60) speed -= 2;
    
    // Maybe spawn bonus
    if (Math.random() < 0.3) spawnBonus();
  } else if (bonus && head.x === bonus.x && head.y === bonus.y) {
    score += 50;
    spawnParticle(bonus.x, bonus.y, '#ffe600');
    bonus = null;
    bonusTimer = 0;
    ate = true;
  } else {
    snake.pop();
  }
  
  // Update bonus
  if (bonus) {
    bonusTimer--;
    if (bonusTimer <= 0) bonus = null;
  }
  
  // Update particles
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.life -= p.decay;
  });
  particles = particles.filter(p => p.life > 0);
  
  gridPulse += 0.02;
  updateUI();
}

function draw() {
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // Grid
  ctx.strokeStyle = 'rgba(0,255,255,0.03)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x < canvas.width; x += GRID) {
    ctx.beginPath();
    ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
  }
  for (let y = 0; y < canvas.height; y += GRID) {
    ctx.beginPath();
    ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
  }
  
  // Draw food
  const foodPulse = 1 + Math.sin(Date.now() * 0.005) * 0.15;
  ctx.save();
  ctx.shadowColor = '#39ff14';
  ctx.shadowBlur = 15;
  ctx.fillStyle = '#39ff14';
  const fx = food.x * GRID + GRID/2;
  const fy = food.y * GRID + GRID/2;
  const fr = (GRID/2 - 2) * foodPulse;
  ctx.beginPath();
  ctx.arc(fx, fy, fr, 0, Math.PI * 2);
  ctx.fill();
  // Inner highlight
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.beginPath();
  ctx.arc(fx - fr*0.25, fy - fr*0.25, fr*0.35, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
  
  // Draw bonus
  if (bonus) {
    const bpulse = 1 + Math.sin(Date.now() * 0.008) * 0.2;
    ctx.save();
    ctx.shadowColor = '#ffe600';
    ctx.shadowBlur = 20;
    const bx = bonus.x * GRID + GRID/2;
    const by = bonus.y * GRID + GRID/2;
    const br = (GRID/2 - 1) * bpulse;
    // Star shape
    ctx.fillStyle = '#ffe600';
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const angle = (i * Math.PI * 2) / 5 - Math.PI / 2;
      const outerR = br;
      const innerR = br * 0.4;
      if (i === 0) ctx.moveTo(bx + Math.cos(angle) * outerR, by + Math.sin(angle) * outerR);
      else ctx.lineTo(bx + Math.cos(angle) * outerR, by + Math.sin(angle) * outerR);
      ctx.lineTo(bx + Math.cos(angle + Math.PI/5) * innerR, by + Math.sin(angle + Math.PI/5) * innerR);
    }
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }
  
  // Draw snake
  snake.forEach((seg, i) => {
    const alpha = 1 - (i / snake.length) * 0.6;
    const hue = 120 + (i * 2) % 60; // green to cyan
    const x = seg.x * GRID + GRID/2;
    const y = seg.y * GRID + GRID/2;
    
    ctx.save();
    ctx.shadowColor = `hsla(${hue},100%,60%,${alpha})`;
    ctx.shadowBlur = 10 + alpha * 5;
    
    if (i === 0) {
      // Head
      ctx.fillStyle = '#39ff14';
      ctx.beginPath();
      ctx.arc(x, y, GRID/2 - 1, 0, Math.PI * 2);
      ctx.fill();
      // Eyes
      ctx.fillStyle = '#0a0a0f';
      const eyeOffX = dir.x * 4;
      const eyeOffY = dir.y * 4;
      ctx.beginPath();
      ctx.arc(x + eyeOffX - 3, y + eyeOffY - 3, 2.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(x + eyeOffX + 3, y + eyeOffY + 3, 2.5, 0, Math.PI * 2);
      ctx.fill();
    } else {
      // Body segments
      const gradient = ctx.createRadialGradient(x, y, 0, x, y, GRID/2 - 1);
      gradient.addColorStop(0, `hsla(${hue},100%,70%,${alpha})`);
      gradient.addColorStop(1, `hsla(${hue},100%,40%,${alpha * 0.5})`);
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(x, y, GRID/2 - 2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  });
  
  // Particles
  particles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, 2 * p.life, 0, Math.PI * 2);
    ctx.fillStyle = p.color.replace(')', `,${p.life})`);
    ctx.fill();
  });
  
  // Game over overlay
  if (!gameRunning) {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#ff2d95';
    ctx.font = 'bold 28px "Courier New",monospace';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2 - 10);
    ctx.fillStyle = '#fff';
    ctx.font = '15px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.fillText(`得分: ${score}  按空格重新开始`, canvas.width/2, canvas.height/2 + 25);
  } else if (gamePaused) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#0ff';
    ctx.font = 'bold 22px "Courier New",monospace';
    ctx.textAlign = 'center';
    ctx.fillText('PAUSED', canvas.width/2, canvas.height/2);
  }
}

function gameOver() {
  gameRunning = false;
  const best = localStorage.getItem('snakeBest') || 0;
  if (score > best) {
    localStorage.setItem('snakeBest', score);
    document.getElementById('snakeBest').textContent = score;
  }
  updateUI();
}

function toggleSnakePause() {
  if (!gameRunning) return;
  gamePaused = !gamePaused;
}

function gameLoop() {
  update();
  draw();
  gameLoopId = setTimeout(gameLoop, speed);
}

// Controls
document.addEventListener('keydown', e => {
  if (!gameRunning) {
    if (e.code === 'Space') { resetSnake(); gameLoop(); }
    return;
  }
  const keyMap = {
    'ArrowUp': {x:0,y:-1}, 'ArrowDown': {x:0,y:1},
    'ArrowLeft': {x:-1,y:0}, 'ArrowRight': {x:1,y:0},
    'KeyW': {x:0,y:-1}, 'KeyS': {x:0,y:1},
    'KeyA': {x:-1,y:0}, 'KeyD': {x:1,y:0}
  };
  if (keyMap[e.code] && !(dir.x === -keyMap[e.code].x && dir.y === -keyMap[e.code].y)) {
    nextDir = keyMap[e.code];
  }
  if (e.code === 'Space') toggleSnakePause();
});

// D-pad
document.getElementById('dUp').addEventListener('click', () => { if (dir.y !== 1) nextDir = {x:0,y:-1}; });
document.getElementById('dDown').addEventListener('click', () => { if (dir.y !== -1) nextDir = {x:0,y:1}; });
document.getElementById('dLeft').addEventListener('click', () => { if (dir.x !== 1) nextDir = {x:-1,y:0}; });
document.getElementById('dRight').addEventListener('click', () => { if (dir.x !== -1) nextDir = {x:1,y:0}; });

// Touch swipe
let touchStart = null;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  touchStart = {x: e.touches[0].clientX, y: e.touches[0].clientY};
  if (!gameRunning) { resetSnake(); gameLoop(); }
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!touchStart) return;
  const dx = e.touches[0].clientX - touchStart.x;
  const dy = e.touches[0].clientY - touchStart.y;
  if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
  
  if (Math.abs(dx) > Math.abs(dy)) {
    if (dx > 0 && dir.x !== -1) nextDir = {x:1,y:0};
    else if (dx < 0 && dir.x !== 1) nextDir = {x:-1,y:0};
  } else {
    if (dy > 0 && dir.y !== -1) nextDir = {x:0,y:1};
    else if (dy < 0 && dir.y !== 1) nextDir = {x:0,y:-1};
  }
  touchStart = null;
});

// Show dpad on mobile
if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
  document.getElementById('dpad').style.display = 'block';
}

// Load best
const savedBest = localStorage.getItem('snakeBest');
if (savedBest) document.getElementById('snakeBest').textContent = savedBest;

// Start
resetSnake();
gameLoop();
</script>
</body>
</html>
