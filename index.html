<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>捞鱼的入口</title>
  <script>
    (function () {
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.getRegistrations().then(function (registrations) {
            registrations.forEach(function (registration) {
              registration.unregister().catch(function () {});
            });
          });
        });
      }

      if ('caches' in window) {
        window.addEventListener('load', function () {
          caches.keys().then(function (keys) {
            keys.forEach(function (key) {
              caches.delete(key);
            });
          });
        });
      }
    })();
  </script>
  <style>
    :root {
      --bg-deep: #06111c;
      --bg-mid: #0b1f33;
      --panel: rgba(9, 20, 33, 0.68);
      --line: rgba(133, 213, 255, 0.18);
      --text-main: #eff6fb;
      --text-soft: rgba(239, 246, 251, 0.72);
      --text-faint: rgba(239, 246, 251, 0.42);
      --accent: #8cdcff;
      --warm: #f0c97e;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 50% 22%, rgba(92, 174, 229, 0.16), transparent 28%),
        radial-gradient(circle at 82% 18%, rgba(240, 201, 126, 0.12), transparent 20%),
        linear-gradient(180deg, #050d16 0%, #08131f 48%, #050b12 100%);
      color: var(--text-main);
      font-family: "Microsoft YaHei", sans-serif;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 12% 18%, rgba(255,255,255,0.35), transparent),
        radial-gradient(1.5px 1.5px at 72% 30%, rgba(255,255,255,0.28), transparent),
        radial-gradient(1px 1px at 38% 72%, rgba(255,255,255,0.18), transparent),
        radial-gradient(1px 1px at 86% 68%, rgba(255,255,255,0.24), transparent),
        radial-gradient(1.5px 1.5px at 48% 10%, rgba(255,255,255,0.32), transparent);
      animation: drift-stars 8s ease-in-out infinite alternate;
      pointer-events: none;
    }

    .shell {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(320px, 1fr) minmax(260px, 420px);
      gap: 32px;
      align-items: center;
      width: min(1120px, calc(100vw - 48px));
      margin: 0 auto;
      padding: 48px 0;
    }

    .copy {
      max-width: 560px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(140, 220, 255, 0.06);
      color: var(--text-soft);
      font-size: 12px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    .eyebrow::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 16px rgba(140, 220, 255, 0.65);
    }

    h1 {
      margin: 18px 0 14px;
      font-size: clamp(3rem, 7vw, 5.8rem);
      line-height: 0.96;
      letter-spacing: 0.04em;
      background: linear-gradient(135deg, #f8fbff 0%, #c1ebff 48%, #fff2d7 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .summary {
      max-width: 34ch;
      color: var(--text-soft);
      font-size: 1rem;
      line-height: 1.9;
      margin: 0;
    }

    .actions {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 28px;
    }

    .primary,
    .secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 156px;
      padding: 14px 22px;
      border-radius: 999px;
      text-decoration: none;
      transition: transform 0.25s ease, background 0.25s ease, border-color 0.25s ease;
      backdrop-filter: blur(12px);
    }

    .primary {
      background: rgba(140, 220, 255, 0.12);
      border: 1px solid rgba(140, 220, 255, 0.28);
      color: var(--text-main);
    }

    .secondary {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(240, 201, 126, 0.22);
      color: var(--text-soft);
    }

    .primary:hover,
    .secondary:hover {
      transform: translateY(-2px);
    }

    .meta {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 22px;
      color: var(--text-faint);
      font-size: 0.86rem;
    }

    .meta span {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .meta span::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(140, 220, 255, 0.7);
    }

    .visual {
      position: relative;
      height: min(70vh, 640px);
      min-height: 420px;
      border-radius: 32px;
      border: 1px solid rgba(255,255,255,0.05);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.04), transparent 24%),
        linear-gradient(180deg, rgba(8, 18, 30, 0.05), rgba(8, 18, 30, 0.64) 46%, rgba(8, 18, 30, 0));
      overflow: hidden;
      box-shadow: inset 0 0 80px rgba(140, 220, 255, 0.04);
    }

    .visual::before,
    .visual::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 48%;
      border-radius: 50%;
      transform: translate(-50%, -50%);
    }

    .visual::before {
      width: 290px;
      height: 290px;
      border: 1px solid rgba(140, 220, 255, 0.14);
      box-shadow:
        inset 0 0 50px rgba(140, 220, 255, 0.05),
        0 0 100px rgba(50, 91, 130, 0.22);
      animation: drift-orbit 7s ease-in-out infinite;
    }

    .visual::after {
      width: 88px;
      height: 88px;
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(140, 220, 255, 0.18), rgba(14, 37, 60, 0.86));
      box-shadow: inset 0 0 24px rgba(140, 220, 255, 0.12);
      animation: pulse-core 4s ease-in-out infinite;
    }

    .orbit,
    .orbit-alt {
      position: absolute;
      left: 50%;
      top: 48%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: 1px solid rgba(140, 220, 255, 0.16);
    }

    .orbit {
      width: 170px;
      height: 170px;
      animation: spin 12s linear infinite;
    }

    .orbit-alt {
      width: 260px;
      height: 260px;
      border-color: rgba(255,255,255,0.1);
      animation: spin-reverse 16s linear infinite;
    }

    .orbit::before,
    .orbit-alt::before {
      content: "";
      position: absolute;
      left: 0;
      top: 50%;
      width: 10px;
      height: 10px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 16px rgba(140, 220, 255, 0.72);
    }

    .spec {
      position: absolute;
      left: 18px;
      bottom: 20px;
      padding: 14px 16px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.06);
      background: var(--panel);
      color: var(--text-soft);
      line-height: 1.8;
      font-size: 0.84rem;
      backdrop-filter: blur(14px);
    }

    .rail {
      position: absolute;
      top: 14%;
      right: 10px;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      color: rgba(239, 246, 251, 0.34);
      letter-spacing: 0.24em;
      font-size: 0.74rem;
    }

    @keyframes drift-stars {
      from { opacity: 0.7; }
      to { opacity: 1; }
    }

    @keyframes drift-orbit {
      0%, 100% { transform: translate(-50%, -50%) translateY(0); }
      50% { transform: translate(-50%, -50%) translateY(-10px); }
    }

    @keyframes pulse-core {
      0%, 100% { filter: brightness(0.94); }
      50% { filter: brightness(1.16); }
    }

    @keyframes spin {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    @keyframes spin-reverse {
      from { transform: translate(-50%, -50%) rotate(360deg); }
      to { transform: translate(-50%, -50%) rotate(0deg); }
    }

    @media (max-width: 900px) {
      .shell {
        grid-template-columns: 1fr;
        gap: 24px;
        padding: 32px 0;
      }

      .visual {
        height: 320px;
        min-height: 320px;
      }
    }

    @media (max-width: 640px) {
      .shell {
        width: min(100vw - 28px, 1120px);
      }

      .summary {
        max-width: none;
      }

      .actions {
        flex-direction: column;
      }

      .primary,
      .secondary {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="copy">
      <div class="eyebrow">World Entrance</div>
      <h1>捞鱼的世界</h1>
      <p class="summary">从这里进入一颗可漫游的个人网站星球，或者直接回到熟悉的传统博客阅读方式。</p>
      <div class="actions">
        <a class="primary" href="/world/">进入世界</a>
        <a class="secondary" href="/archives/">传统网页版</a>
      </div>
      <div class="meta">
        <span>主塔浏览文章</span>
        <span>NPC 对应专栏</span>
        <span>世界内继续阅读</span>
      </div>
    </section>

    <aside class="visual" aria-hidden="true">
      <div class="rail">DISPLAY TOWER · NPC ROUTE · PERSONAL WORLD</div>
      <div class="orbit"></div>
      <div class="orbit-alt"></div>
      <div class="spec">
        世界入口在这里开始<br />
        沉浸探索与传统阅读并存<br />
        两条路径都可以继续走下去
      </div>
    </aside>
  </main>
</body>
</html>
