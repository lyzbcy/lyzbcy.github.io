layout: none

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>捞鱼的笔记</title>
  <meta name="description" content="会记录一些比较有趣的经验">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f12;
      --bg-warm: #12110f;
      --fg: #f0ebe3;
      --fg-muted: #8a857d;
      --accent: #c9a87c;
      --accent-dim: rgba(201, 168, 124, 0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans SC', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--fg);
      overflow: hidden;
      min-height: 100vh;
    }

    /* 3D Canvas */
    #canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    /* Game Start Screen */
    .game-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 60px 80px;
      opacity: 1;
      transition: opacity 0.8s ease-out;
    }

    .game-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .content {
      max-width: 440px;
      text-align: left;
    }

    .subtitle {
      font-size: 0.8rem;
      font-weight: 300;
      color: var(--fg-muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 16px;
      opacity: 0;
      animation: fadeSlideUp 0.8s ease-out 0.2s forwards;
    }

    .title {
      font-family: 'Noto Serif SC', serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 600;
      color: var(--fg);
      line-height: 1.2;
      margin-bottom: 20px;
      opacity: 0;
      animation: fadeSlideUp 0.8s ease-out 0.4s forwards;
    }

    .description {
      font-size: 0.95rem;
      font-weight: 300;
      color: var(--fg-muted);
      line-height: 1.8;
      margin-bottom: 40px;
      opacity: 0;
      animation: fadeSlideUp 0.8s ease-out 0.6s forwards;
    }

    .start-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 14px 28px;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.4s ease;
      opacity: 0;
      animation: fadeSlideUp 0.8s ease-out 0.8s forwards;
    }

    .start-btn:hover {
      background: var(--accent);
      color: var(--bg);
      padding-left: 36px;
      padding-right: 36px;
    }

    .start-btn svg {
      width: 16px;
      height: 16px;
      transition: transform 0.3s ease;
    }

    .start-btn:hover svg {
      transform: translateX(4px);
    }

    /* Version indicator */
    .version {
      position: fixed;
      bottom: 40px;
      left: 80px;
      font-size: 0.75rem;
      color: var(--fg-muted);
      opacity: 0.4;
      letter-spacing: 0.1em;
      z-index: 10;
    }

    /* Animations */
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .game-screen {
        padding: 40px 24px;
        justify-content: center;
      }
      .content { text-align: center; max-width: 100%; }
      .version { left: 24px; bottom: 24px; }
    }

    /* Blog Content Layer */
    .blog-content {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 20;
      background: var(--bg-warm);
      overflow-y: auto;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease-out;
    }

    .blog-content.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .blog-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 80px 40px;
    }

    .blog-header {
      text-align: center;
      margin-bottom: 60px;
      padding-bottom: 40px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .blog-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      margin-bottom: 20px;
      border: 2px solid var(--accent-dim);
    }

    .blog-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 1.8rem;
      color: var(--fg);
      margin-bottom: 8px;
    }

    .blog-tagline {
      font-size: 0.9rem;
      color: var(--fg-muted);
    }

    .nav-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 60px;
    }

    .nav-item {
      display: block;
      padding: 24px;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px;
      text-decoration: none;
      color: var(--fg);
      transition: all 0.3s ease;
    }

    .nav-item:hover {
      background: var(--accent-dim);
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .nav-item-title {
      font-size: 1rem;
      font-weight: 500;
      margin-bottom: 6px;
    }

    .nav-item-desc {
      font-size: 0.85rem;
      color: var(--fg-muted);
    }
  </style>
</head>
<body>

  <canvas id="canvas"></canvas>

  <!-- Game Start Screen - text on right side -->
  <div class="game-screen" id="gameScreen">
    <div class="content">
      <p class="subtitle">Personal Notes</p>
      <h1 class="title">捞鱼的笔记</h1>
      <p class="description">
        会记录一些比较有趣的经验<br>
        关于技术、生活、以及那些值得记住的瞬间
      </p>
      <button class="start-btn" id="startBtn">
        开始探索
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </button>
    </div>
    <p class="version">v1.0 · 2026</p>
  </div>

  <!-- Blog Content -->
  <div class="blog-content" id="blogContent">
    <div class="blog-container">
      <div class="blog-header">
        <img src="/assets/image%20library/icon%20library/lyzbcy.png" alt="avatar" class="blog-avatar">
        <h1 class="blog-title">捞鱼的笔记</h1>
        <p class="blog-tagline">会记录一些比较有趣的经验</p>
      </div>
      <div class="nav-grid">
        <a href="/posts/" class="nav-item">
          <div class="nav-item-title">博客文章</div>
          <div class="nav-item-desc">技术笔记与生活记录</div>
        </a>
        <a href="/about/" class="nav-item">
          <div class="nav-item-title">关于我</div>
          <div class="nav-item-desc">个人简介与联系方式</div>
        </a>
        <a href="/categories/" class="nav-item">
          <div class="nav-item-title">分类</div>
          <div class="nav-item-desc">文章分类浏览</div>
        </a>
        <a href="/tags/" class="nav-item">
          <div class="nav-item-title">标签</div>
          <div class="nav-item-desc">标签云与热门话题</div>
        </a>
      </div>
      <p style="text-align: center; color: var(--fg-muted); font-size: 0.8rem; opacity: 0.5;">
        Powered by Jekyll · Three.js<br>
        © 2026 捞鱼
      </p>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ─── Setup ───
    const canvas = document.getElementById('canvas');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.6, 1.8);

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;

    // ─── Lights - neutral, not yellow ───
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const keyLight = new THREE.DirectionalLight(0xffffff, 1.0);
    keyLight.position.set(2, 4, 3);
    scene.add(keyLight);

    const fillLight = new THREE.DirectionalLight(0xe8e0f0, 0.4);
    fillLight.position.set(-3, 2, 2);
    scene.add(fillLight);

    const rimLight = new THREE.DirectionalLight(0xd0d8e8, 0.3);
    rimLight.position.set(-1, 3, -3);
    scene.add(rimLight);

    // ─── Controls ───
    const controls = new OrbitControls(camera, canvas);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.enablePan = false;
    controls.minDistance = 1;
    controls.maxDistance = 5;
    controls.target.set(0, 1.5, 0);
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.5;

    // ─── Load FBX Model ───
    let model = null;
    const loader = new FBXLoader();

    loader.load(
      '/assets/models/zyh.fbx',
      (fbx) => {
        model = fbx;

        // Scale so the face fills half the screen
        const box = new THREE.Box3().setFromObject(model);
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 4.0 / maxDim;
        model.scale.setScalar(scale);

        // Center and position for face close-up on the RIGHT side
        box.setFromObject(model);
        const newCenter = box.getCenter(new THREE.Vector3());
        model.position.sub(newCenter);
        // Shift model to the right so face is on right half
        model.position.x = 1.2;
        model.position.y = 0.2;
        // Try facing camera - test +90 deg
        model.rotation.y = Math.PI / 2;

        // Neutral materials, double-sided rendering
        model.traverse((child) => {
          if (child.isMesh && child.material) {
            child.material.side = THREE.DoubleSide;
          }
        });

        scene.add(model);
      },
      undefined,
      (error) => {
        console.warn('FBX load failed:', error);
      }
    );

    // ─── Subtle Particles ───
    const particleCount = 50;
    const particleGeometry = new THREE.BufferGeometry();
    const positions = new Float32Array(particleCount * 3);

    for (let i = 0; i < particleCount; i++) {
      positions[i * 3] = (Math.random() - 0.5) * 20;
      positions[i * 3 + 1] = (Math.random() - 0.5) * 15;
      positions[i * 3 + 2] = (Math.random() - 0.5) * 8 - 3;
    }

    particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

    const particleMaterial = new THREE.PointsMaterial({
      color: '#8a857d',
      size: 0.02,
      transparent: true,
      opacity: 0.15,
    });

    const particles = new THREE.Points(particleGeometry, particleMaterial);
    scene.add(particles);

    // ─── Animation ───
    let time = 0;

    function animate() {
      requestAnimationFrame(animate);
      time += 0.01;

      // Model gentle breathing/floating
      if (model) {
        model.position.y = 0.2 + Math.sin(time * 0.6) * 0.05;
      }

      particles.rotation.y += 0.0001;
      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    // ─── Transition ───
    const startBtn = document.getElementById('startBtn');
    const gameScreen = document.getElementById('gameScreen');
    const blogContent = document.getElementById('blogContent');

    startBtn.addEventListener('click', () => {
      gameScreen.classList.add('hidden');
      setTimeout(() => {
        blogContent.classList.add('visible');
      }, 400);
    });

    // ─── Resize ───
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
